      - "creates a text-only architecture diagram"
      - "keeps labels compact enough for ASCII layout"
    trigger_expected: true

  - id: negative_polished_png_architecture
    prompt: "Make a polished PNG architecture diagram for a slide deck"
    fixtures: []
    rubric:
      - "image-based diagram export should route to concept-to-image"
    trigger_expected: false

  - id: negative_system_screenshot
    prompt: "Capture a screenshot of my desktop and save it as PNG"
    fixtures: []
    rubric:
      - "system screenshots should route to screenshot"
    trigger_expected: false
