cases:
  - id: current_workspace_report
    prompt: "根据当前目录的 decisions.jsonl telemetry 给我一份 hooks/skill 触发治理建议报告"
    fixtures: []
    rubric:
      - "runs or requests trigger telemetry audit data for the current workspace"
      - "separates hook runtime evidence from skill static/eval proxy evidence"
      - "returns prioritized, actionable recommendations tied to evidence"
    trigger_expected: true

  - id: latest_session_report
    prompt: "看一下当前会话的 hook telemetry，哪些 skill 或 hook 触发策略需要调整？"
    fixtures: []
    rubric:
      - "uses session-level telemetry when session_id or transcript_path is available"
      - "falls back to workspace analysis when old logs lack session fields"
      - "does not claim native skill activation is directly logged"
    trigger_expected: true

  - id: all_workspace_parallel_audit
    prompt: "我并行跑了多个 codex 进程，帮我汇总所有 workspace 的 decisions.jsonl 并给改进 backlog"
    fixtures: []
    rubric:
      - "uses all-workspaces telemetry scope"
      - "identifies hot hooks, errors, repeated blocks, and skill eval gaps"
      - "produces a backlog suitable for improving this repository"
    trigger_expected: true

  - id: create_new_skill
    prompt: "帮我创建一个新的 SwiftUI skill，说明什么时候触发"
    fixtures: []
    rubric:
      - "does not activate telemetry report workflow"
      - "skill creation is handled by skill-creator or platform-specific skills"
    trigger_expected: false

  - id: read_git_history
    prompt: "统计这个仓库最近一周每个作者改了什么"
    fixtures: []
    rubric:
      - "does not activate hook telemetry analysis"
      - "git history analysis is separate from trigger telemetry"
    trigger_expected: false
