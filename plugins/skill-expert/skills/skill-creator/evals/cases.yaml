cases:
  - id: create_new_skill
    prompt: "我想把我们团队的上线检查流程做成一个 SKILL.md，帮我创建并设计测试用例"
    fixtures: []
    rubric:
      - "捕获 skill 意图、触发条件和期望输出"
      - "按 skill 创建约定起草或更新 SKILL.md"
      - "为新 skill 规划真实 eval prompts"
    trigger_expected: true

  - id: improve_existing_skill
    prompt: "这个已有 skill 用起来太啰嗦，帮我迭代一下并跑一下 with-skill/baseline 对比"
    fixtures: []
    rubric:
      - "把任务视为迭代式 skill 改进"
      - "使用评估输出和反馈指导修订"
      - "改进指引时保留 skill 的核心目的"
    trigger_expected: true

  - id: optimize_skill_description
    prompt: "帮我为这个 skill 生成正反触发样例，然后优化 frontmatter description 的命中率"
    fixtures: []
    rubric:
      - "创建包含正例和负例的 trigger eval queries"
      - "使用 description optimization loop 或等价流程"
      - "避免过拟合少量精确 prompts"
    trigger_expected: true

  - id: negative_score_only
    prompt: "只给这个 SKILL.md 打分，按知识增量、反模式和实用性列出扣分点"
    fixtures: []
    rubric:
      - "不启动 skill creation workflow"
      - "仅评分 review 应交给 skill-judge"
    trigger_expected: false

  - id: negative_find_external_skill
    prompt: "有没有别人已经写好的 Kubernetes 部署 skill？帮我找一个安装"
    fixtures: []
    rubric:
      - "不启动自定义 skill 创建流程"
      - "外部 skill 发现应交给 find-skills"
    trigger_expected: false
