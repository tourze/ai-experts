cases:
  - id: batch_description_audit
    prompt: "批量扫一下 plugins 下面所有 SKILL.md 的 description，看看哪些会让模型走捷径或者误触发"
    fixtures: []
    rubric:
      - "activates description CSO audit rather than general skill design review"
      - "focuses on frontmatter description trigger quality and shortcut risk"
      - "uses or recommends the cso_audit.mjs scanner"
    trigger_expected: true

  - id: optimize_trigger_description
    prompt: "这个 skill 的 description 太宽了，经常抢别的 skill，帮我改到更准确"
    fixtures: []
    rubric:
      - "treats description as the skill routing surface"
      - "checks for trigger wording, workflow leakage, output leakage, and length"
      - "does not rewrite the SKILL.md body as the primary fix"
    trigger_expected: true

  - id: cso_shortcut_risk
    prompt: "我怀疑 description 里写了完整流程，Claude 没读 SKILL.md 正文就开始按摘要执行了"
    fixtures: []
    rubric:
      - "recognizes CSO shortcut risk from over-specific descriptions"
      - "flags workflow or output details that belong in SKILL.md body"
      - "recommends validating descriptions after edits"
    trigger_expected: true

  - id: negative_runtime_trigger_analysis
    prompt: "根据最近 decisions.jsonl 看看哪些 hook 或 skill 最近误触发最多"
    fixtures: []
    rubric:
      - "does not activate description-only CSO audit"
      - "runtime telemetry analysis belongs to trigger-telemetry-advisor"
    trigger_expected: false

  - id: negative_full_skill_review
    prompt: "给这个 SKILL.md 打个设计质量分，看看知识增量、反模式和渐进加载做得怎么样"
    fixtures: []
    rubric:
      - "does not activate description-only CSO audit"
      - "full design scoring belongs to skill-judge"
    trigger_expected: false
