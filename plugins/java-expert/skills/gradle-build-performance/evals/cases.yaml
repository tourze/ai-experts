cases:
  - id: positive_gradle_build_performance_primary
    prompt: "我需要当 Gradle 构建变慢、需要排查配置阶段或执行阶段瓶颈"
    fixtures: []
    rubric:
      - "recognizes the request as gradle-build-performance territory"
      - "uses the skill-specific workflow or domain criteria instead of giving a generic answer"
    trigger_expected: true

  - id: positive_gradle_build_performance_realistic
    prompt: "帮我处理这个场景：clean build、增量构建或 CI 构建明显变慢。"
    fixtures: []
    rubric:
      - "matches a concrete use case described by the skill"
      - "keeps the response focused on the skill's domain boundary"
    trigger_expected: true

  - id: negative_adjacent_arthas_cpu_high
    prompt: "这个需求应该交给 arthas-cpu-high：当 JVM 或 Java 应用 CPU 飙高、负载异常"
    fixtures: []
    rubric:
      - "adjacent arthas-cpu-high requests should not trigger gradle-build-performance"
    trigger_expected: false

  - id: negative_general_unrelated_task
    prompt: "请帮我写一封简短的会议改期通知邮件"
    fixtures: []
    rubric:
      - "general writing or administrative requests are outside this skill"
    trigger_expected: false
