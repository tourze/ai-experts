cases:
  - id: positive_author_contributions_primary
    prompt: "我需要查看某个作者在分支上的实际贡献、做作者归属审计或回答”谁改了什么”"
    fixtures: []
    rubric:
      - "recognizes the request as author-contributions territory"
      - "uses the skill-specific workflow or domain criteria instead of giving a generic answer"
    trigger_expected: true

  - id: positive_author_contributions_realistic
    prompt: "帮我处理这个场景：用户要看某个作者在当前分支相对 main 或其他上游分支的真实贡献面。"
    fixtures: []
    rubric:
      - "matches a concrete use case described by the skill"
      - "keeps the response focused on the skill's domain boundary"
    trigger_expected: true

  - id: negative_adjacent_commit
    prompt: "这个需求应该交给 commit：求提交代码、commit 变更或完成一组改动需要入库"
    fixtures: []
    rubric:
      - "adjacent commit requests should not trigger author-contributions"
    trigger_expected: false

  - id: negative_general_unrelated_task
    prompt: "请帮我写一封简短的会议改期通知邮件"
    fixtures: []
    rubric:
      - "general writing or administrative requests are outside this skill"
    trigger_expected: false
