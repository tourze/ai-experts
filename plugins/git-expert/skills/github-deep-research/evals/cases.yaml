cases:
  - id: positive_github_deep_research_primary
    prompt: "我需要深挖单个 GitHub 仓库、做演进时间线或分析架构与竞争格局"
    fixtures: []
    rubric:
      - "recognizes the request as github-deep-research territory"
      - "uses the skill-specific workflow or domain criteria instead of giving a generic answer"
    trigger_expected: true

  - id: positive_github_deep_research_realistic
    prompt: "帮我处理这个场景：用户已经锁定了某个 GitHub 仓库，要做深入分析而不是简单搜索。"
    fixtures: []
    rubric:
      - "matches a concrete use case described by the skill"
      - "keeps the response focused on the skill's domain boundary"
    trigger_expected: true

  - id: negative_adjacent_author_contributions
    prompt: "这个需求应该交给 author-contributions：查看某个作者在分支上的实际贡献、做作者归属审计或回答”谁改了什么”"
    fixtures: []
    rubric:
      - "adjacent author-contributions requests should not trigger github-deep-research"
    trigger_expected: false

  - id: negative_general_unrelated_task
    prompt: "请帮我写一封简短的会议改期通知邮件"
    fixtures: []
    rubric:
      - "general writing or administrative requests are outside this skill"
    trigger_expected: false
