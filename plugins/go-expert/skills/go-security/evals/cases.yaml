cases:
  - id: sql_injection_review
    prompt: "审查这段 Go 代码的安全性：db.Query(\"SELECT * FROM users WHERE name = '\" + name + \"'\")"
    fixtures: []
    rubric:
      - "触发 go-security"
      - "指出 SQL 注入风险"
      - "建议参数化查询替代字符串拼接"
    trigger_expected: true

  - id: crypto_token_generation
    prompt: "Go 服务需要生成 API token，当前用 math/rand 生成 16 位数字，评估安全性"
    fixtures: []
    rubric:
      - "触发 go-security"
      - "指出 math/rand 不具备密码学安全性"
      - "建议使用 crypto/rand 生成 token"
    trigger_expected: true

  - id: negative_nil_pointer
    prompt: "Go 代码在线上出现 nil pointer dereference panic，帮我排查"
    fixtures: []
    rubric:
      - "不触发 go-security"
      - "运行时 nil 安全属于 go-safety"
    trigger_expected: false

  - id: negative_concurrency_pattern
    prompt: "Go 项目需要用 worker pool 处理任务，推荐什么并发模式？"
    fixtures: []
    rubric:
      - "不触发 go-security"
      - "并发模式属于 go-concurrency-patterns"
    trigger_expected: false
