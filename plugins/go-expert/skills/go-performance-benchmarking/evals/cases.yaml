cases:
  - id: benchmark_compare
    prompt: "帮我给两个 Go 实现写 benchmark，并用 benchstat 判断哪个更快"
    fixtures: []
    rubric:
      - "触发 go-performance-benchmarking"
      - "提供 go test -bench -benchmem -count 命令"
      - "使用 benchstat 比较改前改后"
    trigger_expected: true

  - id: pprof_profile
    prompt: "Go 服务 CPU 飙高，pprof 应该怎么采集和分析？"
    fixtures: []
    rubric:
      - "触发 go-performance-benchmarking"
      - "要求先采集 profile 再提出优化"
      - "区分 CPU、内存、锁或外部 I/O 瓶颈"
    trigger_expected: true

  - id: negative_error_wrapping
    prompt: "Go 代码里 fmt.Errorf 应该用 %w 还是 %v？"
    fixtures: []
    rubric:
      - "不触发 go-performance-benchmarking"
      - "错误包装属于 go-error-handling"
    trigger_expected: false

  - id: negative_http_test
    prompt: "Go HTTP handler 应该怎么用 httptest 写单元测试？"
    fixtures: []
    rubric:
      - "不触发 go-performance-benchmarking"
      - "测试模式属于 go-testing-patterns"
    trigger_expected: false

