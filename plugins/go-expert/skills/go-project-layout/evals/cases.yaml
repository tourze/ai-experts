cases:
  - id: new_project_layout
    prompt: "新建一个 Go 微服务项目，不知道目录该怎么组织，有哪些建议？"
    fixtures: []
    rubric:
      - "触发 go-project-layout"
      - "提到 cmd/, internal/, pkg/ 等目录用途"
      - "强调不要创建 utils/helpers 包"
    trigger_expected: true

  - id: workspace_setup
    prompt: "Go monorepo 里多个模块怎么用 go.work 管理？go.mod 之间怎么引用？"
    fixtures: []
    rubric:
      - "触发 go-project-layout"
      - "提到 go.work 和 use 指令"
      - "说明各模块独立版本发布"
    trigger_expected: true

  - id: negative_naming
    prompt: "Go 里包名应该用单数还是复数？叫 user 还是 users？"
    fixtures: []
    rubric:
      - "不触发 go-project-layout"
      - "包命名属于 go-naming"
    trigger_expected: false

  - id: negative_error_handling
    prompt: "Go 项目里 fmt.Errorf 用 %w 包装错误时，调用方怎么解包？"
    fixtures: []
    rubric:
      - "不触发 go-project-layout"
      - "错误处理属于 go-error-handling"
    trigger_expected: false
