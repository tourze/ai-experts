cases:
  - id: naming_constructor
    prompt: "Go 里一个包有两种类型 Server 和 Proxy，构造器怎么命名？"
    fixtures: []
    rubric:
      - "触发 go-naming"
      - "建议单类型用 New，多类型用 NewServer / NewProxy"
      - "提及避免与包名重复"
    trigger_expected: true

  - id: naming_acronym
    prompt: "Go 结构体字段应该叫 Url 还是 URL？json tag 用什么大小写？"
    fixtures: []
    rubric:
      - "触发 go-naming"
      - "缩写全大写或全小写，不混用"
      - "导出字段 URL，json tag 用 url"
    trigger_expected: true

  - id: negative_concurrency
    prompt: "Go 的 sync.Mutex 和 channel 应该用哪个做并发控制？"
    fixtures: []
    rubric:
      - "不触发 go-naming"
      - "属于 go-concurrency-patterns"
    trigger_expected: false

  - id: negative_mod_version
    prompt: "go.mod 里 indirect 依赖是什么意思？怎么清理？"
    fixtures: []
    rubric:
      - "不触发 go-naming"
      - "依赖管理不是命名问题"
    trigger_expected: false
