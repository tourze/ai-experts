cases:
  - id: positive_perl_testing_primary
    prompt: "我需要当要为 Perl 代码编写或审查测试"
    fixtures: []
    rubric:
      - "recognizes the request as perl-testing territory"
      - "uses the skill-specific workflow or domain criteria instead of giving a generic answer"
    trigger_expected: true

  - id: positive_perl_testing_realistic
    prompt: "帮我处理这个场景：为 Perl 模块补单元测试、集成测试或回归测试。"
    fixtures: []
    rubric:
      - "matches a concrete use case described by the skill"
      - "keeps the response focused on the skill's domain boundary"
    trigger_expected: true

  - id: negative_adjacent_perl_modern_style
    prompt: "这个需求应该交给 perl-modern-style：用 Perl 5.36+ 现代约定编写模块、对象或依赖管理时使用；英文触发词 Perl / Moo / Moose / cpanfile / carton。"
    fixtures: []
    rubric:
      - "adjacent perl-modern-style requests should not trigger perl-testing"
    trigger_expected: false

  - id: negative_general_unrelated_task
    prompt: "请帮我写一封简短的会议改期通知邮件"
    fixtures: []
    rubric:
      - "general writing or administrative requests are outside this skill"
    trigger_expected: false
