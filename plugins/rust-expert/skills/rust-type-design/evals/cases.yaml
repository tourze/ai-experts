  - id: negative_adjacent_rust_async_patterns
    prompt: "这个需求应该交给 rust-async-patterns：需要开发或排障 Tokio 异步代码时使用；涉及 tokio::spawn、JoinSet、channel、select! 或异步生命周期"
    fixtures: []
