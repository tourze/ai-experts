cases:
  - id: positive_rust_type_design_primary
    prompt: "我需要在泛型与 trait object 之间做选择、设计静态/动态分发边界、或用类型状态模式把非法状态变成编译错误"
    fixtures: []
    rubric:
      - "recognizes the request as rust-type-design territory"
      - "uses the skill-specific workflow or domain criteria instead of giving a generic answer"
