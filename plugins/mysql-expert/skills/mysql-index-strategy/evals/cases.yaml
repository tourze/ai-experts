cases:
  - id: positive_mysql_index_strategy_primary
    prompt: "我需要设计、审查或优化 MySQL 索引、复合索引顺序或解读 EXPLAIN 时使用；英文触发词 MySQL index / EXPLAIN / composite index / covering index。"
    fixtures: []
    rubric:
      - "recognizes the request as mysql-index-strategy territory"
      - "uses the skill-specific workflow or domain criteria instead of giving a generic answer"
    trigger_expected: true

  - id: positive_mysql_index_strategy_realistic
    prompt: "帮我处理这个场景：为业务查询设计复合索引，需要确定列顺序和覆盖范围。"
    fixtures: []
    rubric:
      - "matches a concrete use case described by the skill"
      - "keeps the response focused on the skill's domain boundary"
    trigger_expected: true

  - id: negative_adjacent_mysql_json_generated_columns
    prompt: "这个需求应该交给 mysql-json-generated-columns：在 MySQL 中使用 JSON 列、虚拟列或存储生成列做稀疏属性建模与索引化"
    fixtures: []
    rubric:
      - "adjacent mysql-json-generated-columns requests should not trigger mysql-index-strategy"
    trigger_expected: false

  - id: negative_general_unrelated_task
    prompt: "请帮我写一封简短的会议改期通知邮件"
    fixtures: []
    rubric:
      - "general writing or administrative requests are outside this skill"
    trigger_expected: false
