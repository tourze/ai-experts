cases:
  - id: positive_mysql_schema_design_primary
    prompt: "我需要设计或审查 MySQL 8.x 表结构、列类型、字符集、引擎选择或主键策略"
    fixtures: []
    rubric:
      - "recognizes the request as mysql-schema-design territory"
      - "uses the skill-specific workflow or domain criteria instead of giving a generic answer"
    trigger_expected: true

  - id: positive_mysql_schema_design_realistic
    prompt: "帮我处理这个场景：新建或变更业务表，需要确定列类型、主键策略、字符集与存储引擎。"
    fixtures: []
    rubric:
      - "matches a concrete use case described by the skill"
      - "keeps the response focused on the skill's domain boundary"
    trigger_expected: true

  - id: negative_adjacent_mysql_index_strategy
    prompt: "这个需求应该交给 mysql-index-strategy：设计、审查或优化 MySQL 索引、复合索引顺序或解读 EXPLAIN 时使用；英文触发词 MySQL index / EXPLAIN / composite index / covering index。"
    fixtures: []
    rubric:
      - "adjacent mysql-index-strategy requests should not trigger mysql-schema-design"
    trigger_expected: false

  - id: negative_general_unrelated_task
    prompt: "请帮我写一封简短的会议改期通知邮件"
    fixtures: []
    rubric:
      - "general writing or administrative requests are outside this skill"
    trigger_expected: false
