cases:
  - id: slow_query_explain
    prompt: "This query takes 12 seconds on a table with 5 million rows, here's the EXPLAIN output"
    fixtures: []
    rubric:
      - "analyzes the execution plan for full table scans, missing indexes, or bad join order"
      - "suggests specific index creation with column order rationale"
      - "provides rewritten query if structural changes improve performance"
    trigger_expected: true

  - id: pagination_at_scale
    prompt: "Our OFFSET/LIMIT pagination is getting slower as users go deeper, how do I fix this?"
    fixtures: []
    rubric:
      - "explains why OFFSET scanning is O(n) and degrades at depth"
      - "proposes keyset/cursor pagination with WHERE id > last_seen"
      - "covers index coverage for the cursor column and sort order"
    trigger_expected: true

  - id: batch_insert_performance
    prompt: "Inserting 100k rows one by one takes 20 minutes, how to speed up bulk inserts?"
    fixtures: []
    rubric:
      - "recommends batch INSERT with multi-row VALUES or COPY/LOAD DATA"
      - "suggests disabling indexes/constraints during bulk load then rebuilding"
      - "covers transaction batching and autocommit tuning"
    trigger_expected: true

  - id: negative_schema_design
    prompt: "Help me design the database schema for a multi-tenant SaaS application"
    fixtures: []
    rubric:
      - "does not activate sql optimization workflow"
      - "schema design is a modeling task, not query optimization"
    trigger_expected: false
