cases:
  - id: stuck_on_bug
    prompt: "I'm stuck on a bug: the checkout total is sometimes wrong but I can't find the pattern. Help me debug it systematically"
    fixtures: []
    rubric:
      - "uses a systematic debugging workflow"
      - "starts with reproduction and expected vs actual behavior"
      - "forms evidence-based, falsifiable hypotheses"
    trigger_expected: true

  - id: flaky_test_failure
    prompt: "This integration test fails maybe one out of ten runs in CI and I can't reproduce it locally"
    fixtures: []
    rubric:
      - "treats the issue as flaky behavior requiring evidence collection"
      - "isolates variables such as timing, data, order, and environment"
      - "does not jump straight to a speculative fix"
    trigger_expected: true

  - id: crash_stack_trace
    prompt: "The app crashes with this stack trace after login; can you help me find the root cause instead of patching symptoms?"
    fixtures: []
    rubric:
      - "uses stack trace as evidence for root-cause investigation"
      - "narrows scope before proposing changes"
      - "requires regression coverage after the fix"
    trigger_expected: true

  - id: positive_mac_app_freeze
    prompt: "The macOS app is frozen. Attach LLDB and capture all-thread backtraces to diagnose the hang"
    fixtures: []
    rubric:
      - "uses LLDB or debugger thread backtraces"
      - "looks for deadlock, blocking IPC, or main-thread stall patterns"
    trigger_expected: true

  - id: positive_high_cpu_sampling
    prompt: "This native process has high CPU with no logs. Use debugger stack samples to identify the busy loop"
    fixtures: []
    rubric:
      - "captures repeated thread stack samples"
      - "analyzes hot loops or spin behavior"
    trigger_expected: true


  - id: positive_named_pipe_trace
    prompt: "Set up GDB dprintf with a named pipe so I can trace this running Linux process without blocking the agent"
    fixtures: []
    rubric:
      - "uses GDB dprintf or equivalent nonblocking trace"
      - "keeps the debugged process and agent interaction nonblocking"
    trigger_expected: true

  - id: positive_conditional_long_running_trace
    prompt: "Attach GDB to a long-running service and collect conditional trace output without pausing on breakpoints"
    fixtures: []
    rubric:
      - "uses non-stopping tracepoints or dprintf-style instrumentation"
      - "avoids interactive breakpoint blocking"
    trigger_expected: true


  - id: negative_known_fix_request
    prompt: "Change the timeout from 5 seconds to 30 seconds in this config file"
    fixtures: []
    rubric:
      - "does not activate debugging methodology"
      - "the user gave a direct known edit, not a root-cause investigation"
    trigger_expected: false

  - id: negative_code_quality_review
    prompt: "Review this module for naming, error handling, and maintainability issues"
    fixtures: []
    rubric:
      - "does not activate debugging methodology"
      - "general quality review belongs to code-review"
    trigger_expected: false
