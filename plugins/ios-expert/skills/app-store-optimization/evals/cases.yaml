cases:
  - id: positive_app_store_optimization_primary
    prompt: "我需要做 App Store 或 Google Play 的 ASO 优化"
    fixtures: []
    rubric:
      - "recognizes the request as app-store-optimization territory"
      - "uses the skill-specific workflow or domain criteria instead of giving a generic answer"
    trigger_expected: true

  - id: positive_app_store_optimization_realistic
    prompt: "帮我处理这个场景：需要评估关键词、标题、副标题、描述和关键词字段。"
    fixtures: []
    rubric:
      - "matches a concrete use case described by the skill"
      - "keeps the response focused on the skill's domain boundary"
    trigger_expected: true

  - id: negative_adjacent_app_store_changelog
    prompt: "这个需求应该交给 app-store-changelog：写 App Store 发布说明、版本更新文案或门店更新摘要"
    fixtures: []
    rubric:
      - "adjacent app-store-changelog requests should not trigger app-store-optimization"
    trigger_expected: false

  - id: negative_general_unrelated_task
    prompt: "请帮我写一封简短的会议改期通知邮件"
    fixtures: []
    rubric:
      - "general writing or administrative requests are outside this skill"
    trigger_expected: false
