cases:
  - id: positive_macos_design_guidelines_primary
    prompt: "我需要按 Apple Human Interface Guidelines 设计 macOS 原生界面时使用。适用于菜单栏、窗口、工具栏、键盘快捷键、侧边栏和桌面交互。"
    fixtures: []
    rubric:
      - "recognizes the request as macos-design-guidelines territory"
      - "uses the skill-specific workflow or domain criteria instead of giving a generic answer"
    trigger_expected: true

  - id: positive_macos_design_guidelines_realistic
    prompt: "帮我处理这个场景：设计或评审 macOS 的 SwiftUI / AppKit 界面。"
    fixtures: []
    rubric:
      - "matches a concrete use case described by the skill"
      - "keeps the response focused on the skill's domain boundary"
    trigger_expected: true

  - id: negative_adjacent_app_store_changelog
    prompt: "这个需求应该交给 app-store-changelog：写 App Store 发布说明、版本更新文案或门店更新摘要"
    fixtures: []
    rubric:
      - "adjacent app-store-changelog requests should not trigger macos-design-guidelines"
    trigger_expected: false

  - id: negative_general_unrelated_task
    prompt: "请帮我写一封简短的会议改期通知邮件"
    fixtures: []
    rubric:
      - "general writing or administrative requests are outside this skill"
    trigger_expected: false
