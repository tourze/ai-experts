cases:
  - id: positive_meeting_notes_and_actions_primary
    prompt: "我需要把会议转写、电话记录或零散笔记整理成轻量摘要、决策、风险和行动项。"
    fixtures: []
    rubric:
      - "recognizes the request as meeting-notes-and-actions territory"
      - "uses the skill-specific workflow or domain criteria instead of giving a generic answer"
    trigger_expected: true

  - id: positive_meeting_notes_and_actions_realistic
    prompt: "帮我处理这个场景：用户贴来 Zoom、Meet、Teams、飞书会议或电话沟通的转写文本，希望快速提炼重点。"
    fixtures: []
    rubric:
      - "matches a concrete use case described by the skill"
      - "keeps the response focused on the skill's domain boundary"
    trigger_expected: true

  - id: negative_adjacent_meeting_insights_analyzer
    prompt: "请基于会议转写分析沟通模式、发言占比、打断频率和冲突处理方式。"
    fixtures: []
    rubric:
      - "adjacent meeting-insights-analyzer requests should not trigger meeting-notes-and-actions"
    trigger_expected: false

  - id: negative_adjacent_meeting_minutes
    prompt: "请按正式会议纪要格式整理，包含出席情况、议程、决策、行动项、风险和后续安排。"
    fixtures: []
    rubric:
      - "formal meeting minutes requests should not trigger meeting-notes-and-actions"
    trigger_expected: false

  - id: negative_general_unrelated_task
    prompt: "请帮我写一封简短的会议改期通知邮件"
    fixtures: []
    rubric:
      - "general writing or administrative requests are outside this skill"
    trigger_expected: false
