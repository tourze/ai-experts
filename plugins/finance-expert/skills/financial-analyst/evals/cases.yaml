cases:
  - id: positive_financial_analyst_primary
    prompt: "我需要做财报比率分析、DCF 估值、预算偏差或滚动预测时使用。英文触发词包括 cash flow analysis、budget variance、financial projections。"
    fixtures: []
    rubric:
      - "recognizes the request as financial-analyst territory"
      - "uses the skill-specific workflow or domain criteria instead of giving a generic answer"
    trigger_expected: true

  - id: positive_financial_analyst_realistic
    prompt: "帮我处理这个场景：需要快速完成财报比率分析、预算偏差归因、滚动预测或基础 DCF 估值。"
    fixtures: []
    rubric:
      - "matches a concrete use case described by the skill"
      - "keeps the response focused on the skill's domain boundary"
    trigger_expected: true

  - id: negative_adjacent_creating_financial_models
    prompt: "这个需求应该交给 creating-financial-models：构建 DCF 估值模型、敏感性分析、情景分析或盈亏平衡分析时使用。英文触发词包括 valuation modeling、scenario planning。"
    fixtures: []
    rubric:
      - "adjacent creating-financial-models requests should not trigger financial-analyst"
    trigger_expected: false

  - id: negative_general_unrelated_task
    prompt: "请帮我写一封简短的会议改期通知邮件"
    fixtures: []
    rubric:
      - "general writing or administrative requests are outside this skill"
    trigger_expected: false
