cases:
  - id: positive_bayesian_decision_primary
    prompt: "我们要不要投入 2 个工程师做 AI 功能 MVP？请用先验、证据更新、行动阈值和敏感性分析给一个证据到行动的决策报告。"
    fixtures: []
    rubric:
      - "recognizes the request as bayesian-decision territory"
      - "uses intake -> evidence -> update -> action -> sensitivity -> report rather than a generic recommendation"
      - "includes prior hygiene and next information that could change the decision"
    trigger_expected: true

  - id: positive_uncertain_market_entry
    prompt: "我们在三个海外市场里只能先选一个，已有证据质量参差不齐。帮我做一个带 prior、posterior、expected value 和 what would flip 的决策分析。"
    fixtures: []
    rubric:
      - "handles uncertain strategic choice with evidence grading and action mapping"
      - "does not stop at probability; compares actions and flip conditions"
      - "checks sensitivity and evidence weakness before recommending a market"
    trigger_expected: true

  - id: negative_bayes_tutoring
    prompt: "请用简单语言解释贝叶斯定理是什么，再给一个掷骰子的概率例子。"
    fixtures: []
    rubric:
      - "Bayes theorem tutoring should not trigger bayesian-decision"
    trigger_expected: false

  - id: negative_math_homework
    prompt: "这道概率作业：某疾病先验 1%，检测准确率 95%，阳性后后验概率是多少？请列公式。"
    fixtures: []
    rubric:
      - "textbook probability homework should not trigger bayesian-decision"
    trigger_expected: false

  - id: negative_final_investment_advice
    prompt: "直接告诉我今天要不要买这只股票，给最终投资建议，不要解释过程。"
    fixtures: []
    rubric:
      - "final licensed investment advice should not trigger bayesian-decision as a decision-support report"
    trigger_expected: false
