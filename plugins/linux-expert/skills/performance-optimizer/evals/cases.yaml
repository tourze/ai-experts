cases:
  - id: positive_performance_optimizer_primary
    prompt: "我需要定位 Linux 主机卡顿、高 CPU、高内存、高 IO 或负载暴涨"
    fixtures: []
    rubric:
      - "recognizes the request as performance-optimizer territory"
      - "uses the skill-specific workflow or domain criteria instead of giving a generic answer"
    trigger_expected: true

  - id: positive_performance_optimizer_realistic
    prompt: "帮我处理这个场景：用户反馈系统变慢、负载飙高、构建变卡、内存不足、磁盘 IO 打满或想释放资源。"
    fixtures: []
    rubric:
      - "matches a concrete use case described by the skill"
      - "keeps the response focused on the skill's domain boundary"
    trigger_expected: true

  - id: negative_adjacent_arch_linux_triage
    prompt: "这个需求应该交给 arch-linux-triage：遇到 Arch Linux 的 pacman、systemd、滚动升级、AUR、内核或启动故障"
    fixtures: []
    rubric:
      - "adjacent arch-linux-triage requests should not trigger performance-optimizer"
    trigger_expected: false

  - id: negative_general_unrelated_task
    prompt: "请帮我写一封简短的会议改期通知邮件"
    fixtures: []
    rubric:
      - "general writing or administrative requests are outside this skill"
    trigger_expected: false
