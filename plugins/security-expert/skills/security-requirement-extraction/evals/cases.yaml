cases:
  - id: positive_security_requirement_extraction_primary
    prompt: "我需要当威胁模型、攻击路径或合规要求已明确，需要落地为安全需求"
    fixtures: []
    rubric:
      - "recognizes the request as security-requirement-extraction territory"
      - "uses the skill-specific workflow or domain criteria instead of giving a generic answer"
    trigger_expected: true

  - id: positive_security_requirement_extraction_realistic
    prompt: "帮我处理这个场景：已经有威胁、控制缺口或合规约束，需要整理为需求、验收标准和测试点。"
    fixtures: []
    rubric:
      - "matches a concrete use case described by the skill"
      - "keeps the response focused on the skill's domain boundary"
    trigger_expected: true

  - id: negative_adjacent_active_directory_attacks
    prompt: "这个需求应该交给 active-directory-attacks：明确要求在已授权环境中进行 Active Directory 安全测试，或提到 Kerberoasting、DCSync、BloodHound、NTLM Relay、Golden Ticket 等主题"
    fixtures: []
    rubric:
      - "adjacent active-directory-attacks requests should not trigger security-requirement-extraction"
    trigger_expected: false

  - id: negative_general_unrelated_task
    prompt: "请帮我写一封简短的会议改期通知邮件"
    fixtures: []
    rubric:
      - "general writing or administrative requests are outside this skill"
    trigger_expected: false
