cases:
  - id: positive_gdpr_data_handling_primary
    prompt: "我需要设计 GDPR 合规流程、同意管理、数据主体请求或 breach 响应"
    fixtures: []
    rubric:
      - "recognizes the request as gdpr-data-handling territory"
      - "uses the skill-specific workflow or domain criteria instead of giving a generic answer"
    trigger_expected: true

  - id: positive_gdpr_data_handling_realistic
    prompt: "帮我处理这个场景：设计或审查会处理欧盟个人数据的产品、后台服务、营销流程、客服流程、员工数据系统。"
    fixtures: []
    rubric:
      - "matches a concrete use case described by the skill"
      - "keeps the response focused on the skill's domain boundary"
    trigger_expected: true

  - id: negative_adjacent_employment_contract_templates
    prompt: "这个需求应该交给 employment-contract-templates：起草劳动合同、录用通知、保密协议或 HR 制度文本"
    fixtures: []
    rubric:
      - "adjacent employment-contract-templates requests should not trigger gdpr-data-handling"
    trigger_expected: false

  - id: negative_general_unrelated_task
    prompt: "请帮我写一封简短的会议改期通知邮件"
    fixtures: []
    rubric:
      - "general writing or administrative requests are outside this skill"
    trigger_expected: false
