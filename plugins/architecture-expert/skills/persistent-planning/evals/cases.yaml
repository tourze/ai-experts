cases:
  - id: long_running_repo_task
    prompt: "This migration will span multiple sessions. Set up persistent planning files so another agent can resume safely later."
    fixtures: []
    rubric:
      - "uses repository files for context, plan, progress, and decisions"
      - "records unknowns, decision boundaries, and current phase"
      - "defines completion gates tied to verifiable evidence"
    trigger_expected: true

  - id: resume_after_context_loss
    prompt: "We may lose context during this multi-day refactor. Create a durable planning structure and explain how to resume."
    fixtures: []
    rubric:
      - "captures task intent and desired outcome in persistent context"
      - "records progress entries and active tasks for recovery"
      - "defines a reboot checklist for future sessions"
    trigger_expected: true

  - id: negative_short_todo_list
    prompt: "Make a quick TODO list for fixing three typos."
    fixtures: []
    rubric:
      - "does not activate persistent planning"
      - "short local tasks do not need repository-backed planning"
    trigger_expected: false

  - id: negative_task_breakdown
    prompt: "Break this feature into tasks with dependencies and tests."
    fixtures: []
    rubric:
      - "does not activate persistent planning by default"
      - "task decomposition belongs to task-decomposer unless cross-session persistence is requested"
    trigger_expected: false
