cases:
  - id: debt_governance_roadmap
    prompt: "Create a technical debt governance strategy for a legacy monolith without stopping feature delivery."
    fixtures: []
    rubric:
      - "prioritizes debt by business impact, risk, and repair cost"
      - "proposes phased remediation rather than a rewrite"
      - "allocates ongoing capacity or budget for debt work"
    trigger_expected: true

  - id: executive_debt_budget
    prompt: "Help me justify a tech debt budget to leadership with a roadmap and measurable risk reduction."
    fixtures: []
    rubric:
      - "translates debt into delivery, reliability, or security risk"
      - "defines metrics for measuring improvement"
      - "sequences work into near-term and strategic phases"
    trigger_expected: true

  - id: negative_single_smell
    prompt: "This function is too long; refactor it."
    fixtures: []
    rubric:
      - "does not activate debt governance workflow"
      - "single-code cleanup belongs to code-refiner or refactoring-patterns"
    trigger_expected: false

  - id: negative_product_backlog
    prompt: "Prioritize these product feature requests for next sprint."
    fixtures: []
    rubric:
      - "does not activate technical debt management"
      - "product backlog prioritization is outside this skill"
    trigger_expected: false
