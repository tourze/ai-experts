cases:
  - id: design_multi_agent_runtime
    prompt: "Design a multi-agent runtime with planner, coder, reviewer, and verifier agents. I need fork vs fresh context decisions and state isolation rules."
    fixtures: []
    rubric:
      - "explicitly decides fork vs fresh for each agent type"
      - "defines agent roles, message boundaries, and state ownership"
      - "includes loop control such as max turns, cancellation, or background tracking"
    trigger_expected: true

  - id: system_prompt_architecture
    prompt: "Help me restructure our agent system prompt architecture so reusable prompt sections can be cached and different agent types can override behavior safely."
    fixtures: []
    rubric:
      - "separates prompt sections into modular responsibilities"
      - "defines override points for different agent types"
      - "identifies cache boundaries and invalidation risks"
    trigger_expected: true

  - id: fail_closed_permission_pipeline
    prompt: "Design an AI agent permission pipeline where uncertain operations default to ask or deny, not allow."
    fixtures: []
    rubric:
      - "uses fail-closed semantics for uncertainty and classifier errors"
      - "separates rule-based checks, contextual policy, and optional classifier stages"
      - "defines auditable decision records for allowed, asked, and denied operations"
    trigger_expected: true

  - id: trust_spectrum_for_tools
    prompt: "We need a trust spectrum for autonomous agent actions: read-only shell commands, file edits, network calls, and destructive database commands."
    fixtures: []
    rubric:
      - "classifies operations by risk and trust level"
      - "maps each class to allow, ask, or deny behavior"
      - "handles bypass-immune actions and high-risk overrides"
    trigger_expected: true


  - id: design_tool_contract
    prompt: "Design an agent tool interface for reading files that declares is_read_only, is_destructive, output limits, and schema validation."
    fixtures: []
    rubric:
      - "puts safety and concurrency metadata on the tool specification"
      - "defines input and output schemas with validation behavior"
      - "sets result-size budgets and truncation or paging behavior"
    trigger_expected: true

  - id: deferred_tool_loading
    prompt: "Our agent has 40 tools and context is bloated. Design a deferred-loading tool discovery strategy with core tools always visible."
    fixtures: []
    rubric:
      - "separates core tools from discoverable tools"
      - "defines lookup metadata for delayed loading"
      - "addresses token cost, latency, and tool-selection accuracy"
    trigger_expected: true


  - id: negative_agent_permissions
    prompt: "Design the permission model for an AI coding agent so destructive commands require approval and classifier failures deny access."
    fixtures: []
    rubric:
      - "does not activate orchestration workflow"
      - "permission policy design belongs to agent-permission-safety"
    trigger_expected: false

  - id: negative_tool_schema
    prompt: "Design the schema for a file-search tool, including read-only metadata and token-budgeted results."
    fixtures: []
    rubric:
      - "does not activate orchestration workflow"
      - "tool interface design belongs to agent-tool-design"
    trigger_expected: false
