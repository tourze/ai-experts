cases:
  - id: full_subsystem_audit
    prompt: "Do an exhaustive systems analysis of this repo. Break it into subsystems, list critical risks, and prioritize issues by impact."
    fixtures: []
    rubric:
      - "decomposes the system into subsystems before judging"
      - "binds findings to evidence rather than broad opinion"
      - "prioritizes by severity and operational impact"
    trigger_expected: true

  - id: incident_surface_area_analysis
    prompt: "Analyze every subsystem touched by our checkout outages and identify where the failure modes live."
    fixtures: []
    rubric:
      - "maps subsystem boundaries and interactions"
      - "identifies failure modes across synchronous and asynchronous paths"
      - "distinguishes critical risks from cosmetic issues"
    trigger_expected: true

  - id: negative_architecture_diagram
    prompt: "Draw a component diagram for this service."
    fixtures: []
    rubric:
      - "does not activate exhaustive analysis workflow"
      - "diagram creation belongs to architecture-diagram"
    trigger_expected: false

  - id: negative_single_function_refactor
    prompt: "Refactor this one function to reduce nesting."
    fixtures: []
    rubric:
      - "does not activate system-wide analysis"
      - "localized code simplification belongs to code-refiner"
    trigger_expected: false
