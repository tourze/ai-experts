cases:
  - id: debt_inventory
    prompt: "Audit this codebase for technical debt, rank the debt items, and build a cleanup backlog."
    fixtures: []
    rubric:
      - "identifies code health issues with evidence"
      - "ranks debt by impact, risk, and effort rather than emotion"
      - "turns findings into a maintainable remediation backlog"
    trigger_expected: true

  - id: maintenance_backlog
    prompt: "We need to organize maintenance work: flaky tests, duplicated services, stale dependencies, and risky migrations."
    fixtures: []
    rubric:
      - "groups debt into actionable categories"
      - "prioritizes remediation using a clear scoring model"
      - "distinguishes tactical cleanup from strategic debt work"
    trigger_expected: true

  - id: negative_one_function_refactor
    prompt: "Refactor this long function to reduce nesting."
    fixtures: []
    rubric:
      - "does not activate debt inventory workflow"
      - "localized refactoring belongs to code-refiner"
    trigger_expected: false

  - id: negative_feature_tasks
    prompt: "Break this new feature into implementation tasks."
    fixtures: []
    rubric:
      - "does not activate technical debt workflow"
      - "feature task breakdown belongs to task-decomposer"
    trigger_expected: false
