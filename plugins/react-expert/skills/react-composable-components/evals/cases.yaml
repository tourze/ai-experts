    fixtures: []
    rubric:
      - "recognizes the request as react-composable-components territory"
      - "uses the skill-specific workflow or domain criteria instead of giving a generic answer"
    trigger_expected: true

  - id: positive_react_composable_components_realistic
    prompt: "帮我处理这个场景：单个组件已经承担过多布局、状态和渲染分支，读写成本很高。"
