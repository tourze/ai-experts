cases:
  - id: positive_rspec_testing_primary
    prompt: "我需要当要为 Ruby / Rails 代码编写或审查 RSpec 测试"
    fixtures: []
    rubric:
      - "recognizes the request as rspec-testing territory"
      - "uses the skill-specific workflow or domain criteria instead of giving a generic answer"
    trigger_expected: true

  - id: positive_rspec_testing_realistic
    prompt: "帮我处理这个场景：需要为 Ruby / Rails 代码补单元测试、request spec、job spec 或 service spec。"
    fixtures: []
    rubric:
      - "matches a concrete use case described by the skill"
      - "keeps the response focused on the skill's domain boundary"
    trigger_expected: true

  - id: negative_adjacent_rails_service_patterns
    prompt: "这个需求应该交给 rails-service-patterns：设计 Rails 7+ service/command object、收紧 Active Record 查询与事务边界、或按 bundle exec 工作流规范 controller 职责"
    fixtures: []
    rubric:
      - "adjacent rails-service-patterns requests should not trigger rspec-testing"
    trigger_expected: false

  - id: negative_general_unrelated_task
    prompt: "请帮我写一封简短的会议改期通知邮件"
    fixtures: []
    rubric:
      - "general writing or administrative requests are outside this skill"
    trigger_expected: false
