cases:
  - id: positive_rails_service_patterns_primary
    prompt: "我需要设计 Rails 7+ service/command object、收紧 Active Record 查询与事务边界、或按 bundle exec 工作流规范 controller 职责"
    fixtures: []
    rubric:
      - "recognizes the request as rails-service-patterns territory"
      - "uses the skill-specific workflow or domain criteria instead of giving a generic answer"
    trigger_expected: true

  - id: positive_rails_service_patterns_realistic
    prompt: "帮我处理这个场景：新建或重构 Ruby 3.x / Rails 7+ 代码，尤其是 service object、model、job、command、task 这些常见边界。"
    fixtures: []
    rubric:
      - "matches a concrete use case described by the skill"
      - "keeps the response focused on the skill's domain boundary"
    trigger_expected: true

  - id: negative_adjacent_rspec_testing
    prompt: "这个需求应该交给 rspec-testing：当要为 Ruby / Rails 代码编写或审查 RSpec 测试"
    fixtures: []
    rubric:
      - "adjacent rspec-testing requests should not trigger rails-service-patterns"
    trigger_expected: false

  - id: negative_general_unrelated_task
    prompt: "请帮我写一封简短的会议改期通知邮件"
    fixtures: []
    rubric:
      - "general writing or administrative requests are outside this skill"
    trigger_expected: false
