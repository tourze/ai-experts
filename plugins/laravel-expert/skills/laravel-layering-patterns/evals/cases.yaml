cases:
  - id: positive_laravel_layering_patterns_primary
    prompt: "我需要实现 Laravel 10+ 的 Model/Migration、FormRequest 校验、JsonResource 序列化、Controller 瘦身、异步 Job 编排或 Livewire 组件"
    fixtures: []
    rubric:
      - "recognizes the request as laravel-layering-patterns territory"
      - "uses the skill-specific workflow or domain criteria instead of giving a generic answer"
    trigger_expected: true

  - id: positive_laravel_layering_patterns_realistic
    prompt: "帮我处理这个场景：新增或修改 Laravel 10+ 的模型、迁移、控制器、请求、资源、作业和 Livewire 组件。"
    fixtures: []
    rubric:
      - "matches a concrete use case described by the skill"
      - "keeps the response focused on the skill's domain boundary"
    trigger_expected: true

  - id: negative_adjacent_laravel_patterns
    prompt: "这个需求应该交给 laravel-patterns：提到 Laravel 分层、Service/Action 边界、scopeBindings、多租户路由、N+1 或 API 资源设计"
    fixtures: []
    rubric:
      - "adjacent laravel-patterns requests should not trigger laravel-layering-patterns"
    trigger_expected: false

  - id: negative_general_unrelated_task
    prompt: "请帮我写一封简短的会议改期通知邮件"
    fixtures: []
    rubric:
      - "general writing or administrative requests are outside this skill"
    trigger_expected: false
