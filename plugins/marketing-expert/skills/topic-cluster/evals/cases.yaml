  - id: negative_single_article_plan
    prompt: "Outline one blog post about employee engagement."
    fixtures: []
    rubric:
      - "does not activate topic cluster strategy"
      - "single piece planning belongs to content-strategy"
    trigger_expected: false

  - id: negative_technical_seo
    prompt: "Fix crawl errors and sitemap issues."
    fixtures: []
    rubric:
      - "does not activate topic cluster workflow"
      - "technical search issues belong to seo"
    trigger_expected: false
