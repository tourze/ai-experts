    prompt: "Design a topic cluster around employee engagement with a pillar page and supporting articles."
    fixtures: []
    rubric:
      - "creates pillar and supporting content structure"
      - "maps internal links between hub and spokes"
      - "addresses topical authority and keyword coverage"
