  - id: negative_popup_design
    prompt: "Write copy and trigger rules for an exit-intent popup."
    fixtures: []
    rubric:
      - "does not activate broad CRO methodology"
      - "popup-specific optimization belongs to popup-cro"
    trigger_expected: false

  - id: negative_redesign_landing_page
    prompt: "Rebuild this landing page in React and Tailwind."
    fixtures: []
    rubric:
      - "does not activate CRO methodology"
      - "landing page implementation belongs to redesign-my-landingpage"
    trigger_expected: false
