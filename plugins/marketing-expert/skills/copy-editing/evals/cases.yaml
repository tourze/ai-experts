cases:
  - id: polish_existing_copy
    prompt: "Edit this existing landing page section so it is clearer, tighter, and less generic."
    fixtures: []
    rubric:
      - "improves existing copy rather than creating a new page"
      - "keeps core message and intent intact"
      - "tightens clarity, specificity, and flow"
    trigger_expected: true

  - id: reduce_jargon
    prompt: "Clean up this marketing copy. It has too much jargon and weak verbs."
    fixtures: []
    rubric:
      - "removes jargon and vague phrasing"
      - "strengthens readability and buyer clarity"
      - "does not overhaul strategy unnecessarily"
    trigger_expected: true

  - id: remove_ai_tone
    prompt: "This blog intro sounds AI-generated and generic. Make it more human and brand-specific."
    fixtures: []
    rubric:
      - "reduces generic phrasing and repetitive cadence"
      - "adds natural voice, specificity, and rhythm"
      - "preserves core meaning"
    trigger_expected: true

  - id: humanize_brand_voice
    prompt: "Rewrite this LinkedIn post so it sounds like a real founder wrote it, not a machine."
    fixtures: []
    rubric:
      - "improves authenticity and voice"
      - "removes inflated or template-like language"
      - "keeps the platform context in mind"
    trigger_expected: true

  - id: negative_new_page_copy
    prompt: "Write homepage copy from scratch for our new SaaS product."
    fixtures: []
    rubric:
      - "does not activate editing workflow"
      - "new page copy belongs to copywriting"
    trigger_expected: false

  - id: negative_content_strategy
    prompt: "Create a quarterly content strategy and topic roadmap."
    fixtures: []
    rubric:
      - "does not activate copy editing"
      - "content planning belongs to content-strategy"
    trigger_expected: false
