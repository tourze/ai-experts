cases:
  - id: landing_page_copy
    prompt: "Write landing page copy for our B2B SaaS analytics product: hero, value prop, benefits, proof, and CTA."
    fixtures: []
    rubric:
      - "creates marketing page copy rather than only editing tone"
      - "includes value proposition, benefit framing, proof, and CTA"
      - "keeps message aligned to buyer pains and product promise"
    trigger_expected: true

  - id: pricing_page_copy
    prompt: "Rewrite our pricing page messaging so the three plans feel clearer and more compelling."
    fixtures: []
    rubric:
      - "improves plan positioning and conversion copy"
      - "uses clear differentiation and buyer-oriented benefit language"
      - "does not drift into full pricing strategy unless needed"
    trigger_expected: true

  - id: polish_existing_copy
    prompt: "Edit this existing landing page section so it is clearer, tighter, and less generic."
    fixtures: []
    rubric:
      - "improves existing copy rather than creating a new page"
      - "keeps core message and intent intact"
      - "tightens clarity, specificity, and flow"
    trigger_expected: true

  - id: reduce_jargon
    prompt: "Clean up this marketing copy. It has too much jargon and weak verbs."
    fixtures: []
    rubric:
      - "removes jargon and vague phrasing"
      - "strengthens readability and buyer clarity"
      - "does not overhaul strategy unnecessarily"
    trigger_expected: true

  - id: remove_ai_tone
    prompt: "This blog intro sounds AI-generated and generic. Make it more human and brand-specific."
    fixtures: []
    rubric:
      - "reduces generic phrasing and repetitive cadence"
      - "adds natural voice, specificity, and rhythm"
      - "preserves core meaning"
    trigger_expected: true

  - id: humanize_brand_voice
    prompt: "Rewrite this LinkedIn post so it sounds like a real founder wrote it, not a machine."
    fixtures: []
    rubric:
      - "improves authenticity and voice"
      - "removes inflated or template-like language"
      - "keeps the platform context in mind"
    trigger_expected: true


  - id: apply_persuasion_principles
    prompt: "Apply social proof, authority, scarcity, and reciprocity to improve this pricing page."
    fixtures: []
    rubric:
      - "uses named influence principles"
      - "maps principles to concrete page or copy changes"
      - "keeps persuasion ethical and evidence-based"
    trigger_expected: true

  - id: sales_material_persuasion
    prompt: "Use influence psychology to make our sales one-pager more persuasive."
    fixtures: []
    rubric:
      - "selects relevant persuasion principles for sales material"
      - "explains where each principle should appear"
      - "avoids manipulative or unsupported claims"
    trigger_expected: true


  - id: pricing_page_psychology
    prompt: "How can I use psychology to increase conversions on our pricing page? We sell a B2B SaaS tool with three tiers ($29, $79, $199/month)."
    fixtures: []
    rubric:
      - "Checks for product-marketing-context.md"
      - "Applies pricing psychology models (anchoring, charm pricing, Rule of 100)"
      - "Applies Good-Better-Best framing"
      - "Applies loss aversion to tier differentiation"
      - "Applies social proof near pricing"
      - "Provides specific recommendations for their price points"
      - "References specific mental models by name"
    trigger_expected: true
  - id: ethical_scarcity_principle
    prompt: "Explain the scarcity principle and how to use it ethically in SaaS marketing without being manipulative."
    fixtures: []
    rubric:
      - "Explains scarcity principle clearly"
      - "Provides legitimate SaaS applications"
      - "Distinguishes ethical from manipulative use"
      - "Provides specific examples"
      - "References related mental models"
      - "Addresses ethical considerations directly"
    trigger_expected: true
  - id: psychology_for_copywriting
    prompt: "what psychological principles should I use to write better marketing copy?"
    fixtures: []
    rubric:
      - "Triggers on casual phrasing"
      - "Recommends copy-relevant mental models"
      - "Explains each principle briefly"
      - "Provides specific copywriting application per principle"
      - "Organizes by where each applies in copy"
      - "References multiple model categories"
    trigger_expected: true
  - id: onboarding_behavioral_models
    prompt: "I'm designing an onboarding flow and want to use behavioral psychology to increase activation. What models should I apply?"
    fixtures: []
    rubric:
      - "Applies Goal-Gradient Effect"
      - "Applies Hick's Law"
      - "Applies IKEA Effect or Endowment Effect"
      - "Applies Zeigarnik Effect or commitment principles"
      - "Explains how each applies to onboarding"
      - "Provides actionable recommendations per model"
    trigger_expected: true
  - id: trial_vs_freemium_psychology
    prompt: "What's the psychology behind why free trials work better than freemium for some products?"
    fixtures: []
    rubric:
      - "Applies loss aversion to trial context"
      - "Applies endowment effect"
      - "Applies Zero-Price Effect"
      - "Explains how models interact in trial vs freemium"
      - "Notes when each approach works best"
      - "Provides clear, educational explanation"
    trigger_expected: true
  - id: ab_test_design_boundary
    prompt: "Help me run an A/B test on which psychological principle works better for our CTA — scarcity vs social proof."
    fixtures: []
    rubric:
      - "Recognizes this as an A/B test setup task"
      - "References or defers to cro-methodology"
      - "May provide psychological context for hypothesis"
      - "Does not attempt full test design using psychology patterns"
    trigger_expected: true

  - id: make_message_sticky
    prompt: "Make our product message more memorable using Made to Stick."
    fixtures: []
    rubric:
      - "applies SUCCESs principles"
      - "improves simplicity, concreteness, credibility, emotion, or story"
      - "keeps the core message understandable and memorable"
    trigger_expected: true

  - id: sticky_value_prop
    prompt: "Our value proposition is forgettable. Use SUCCESs to make it stick."
    fixtures: []
    rubric:
      - "diagnoses why the message is not memorable"
      - "rewrites or reframes with sticky-message principles"
      - "explains tradeoffs in the messaging choices"
    trigger_expected: true


  - id: negative_polish_existing_copy
    prompt: "Proofread this existing paragraph and make it less wordy without changing the message."
    fixtures: []
    rubric:
      - "does not activate new page copywriting workflow"
      - "editing existing copy belongs to copy-editing"
    trigger_expected: false

  - id: negative_welcome_email_sequence
    prompt: "Write a five-email welcome sequence for new trial users."
    fixtures: []
    rubric:
      - "does not activate page copywriting workflow"
      - "email journeys belong to email-sequence"
    trigger_expected: false
