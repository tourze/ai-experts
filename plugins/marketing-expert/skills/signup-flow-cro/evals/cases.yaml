cases:
  - id: signup_dropoff_diagnosis
    prompt: "Users abandon our signup flow before creating an account. Diagnose and improve it."
    fixtures: []
    rubric:
      - "focuses on account creation and registration steps"
      - "identifies form, trust, friction, and sequencing issues"
      - "recommends signup-specific experiments"
    trigger_expected: true

  - id: trial_registration_optimization
    prompt: "Optimize our free trial signup form. It asks for six fields and completion is low."
    fixtures: []
    rubric:
      - "targets signup form friction"
      - "recommends field reduction, sequencing, trust, or progressive profiling"
      - "sets signup completion metrics"
    trigger_expected: true

  - id: negative_onboarding_after_signup
    prompt: "Users create accounts but never complete setup or reach the aha moment."
    fixtures: []
    rubric:
      - "does not activate signup flow optimization"
      - "post-signup activation belongs to onboarding-cro"
    trigger_expected: false

  - id: negative_page_cro
    prompt: "Improve our landing page conversion rate before the signup form."
    fixtures: []
    rubric:
      - "does not activate signup flow CRO"
      - "marketing page conversion belongs to page-cro"
    trigger_expected: false
