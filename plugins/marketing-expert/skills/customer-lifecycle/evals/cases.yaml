  - id: negative_email_sequence
    prompt: "Write the exact onboarding and renewal emails."
    fixtures: []
    rubric:
      - "does not activate customer-lifecycle strategy"
      - "email copy belongs to email-sequence"
    trigger_expected: false

  - id: negative_churn_save_flow
    prompt: "Design a cancellation save flow to reduce churn."
    fixtures: []
