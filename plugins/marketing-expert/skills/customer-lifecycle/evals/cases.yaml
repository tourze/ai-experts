cases:
  - id: customer_value_tiering
    prompt: "Segment our customers into value tiers and design different service strategies for each."
    fixtures: []
    rubric:
      - "uses customer value or profitability tiers"
      - "distinguishes high-value, mid-value, and low-value segments"
      - "recommends differential treatment by tier"
    trigger_expected: true

  - id: clv_structure_health
    prompt: "Diagnose whether our customer base is healthy using a customer pyramid model."
    fixtures: []
    rubric:
      - "assesses customer distribution by CLV or profitability"
      - "identifies overdependence or low-value concentration"
      - "suggests movement strategies between tiers"
    trigger_expected: true

  - id: lifecycle_stage_strategy
    prompt: "Analyze our product lifecycle stage and recommend marketing strategy for maturity."
    fixtures: []
    rubric:
      - "identifies lifecycle stage such as introduction, growth, maturity, or decline"
      - "matches marketing strategy to the stage"
      - "distinguishes product lifecycle from customer lifecycle when relevant"
    trigger_expected: true

  - id: customer_lifecycle_campaigns
    prompt: "Plan lifecycle marketing across trial, activation, expansion, renewal, and win-back."
    fixtures: []
    rubric:
      - "maps stages across the customer lifecycle"
      - "assigns goals and tactics per stage"
      - "identifies transition metrics"
    trigger_expected: true

  - id: negative_market_segmentation
    prompt: "Define our target market and positioning statement."
    fixtures: []
    rubric:
      - "does not activate customer-lifecycle"
      - "market segmentation belongs to stp-segmentation"
