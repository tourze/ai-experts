cases:
  - id: lifecycle_stage_strategy
    prompt: "Analyze our product lifecycle stage and recommend marketing strategy for maturity."
    fixtures: []
    rubric:
      - "identifies lifecycle stage such as introduction, growth, maturity, or decline"
      - "matches marketing strategy to the stage"
      - "distinguishes product lifecycle from customer lifecycle when relevant"
    trigger_expected: true

  - id: customer_lifecycle_campaigns
    prompt: "Plan lifecycle marketing across trial, activation, expansion, renewal, and win-back."
    fixtures: []
    rubric:
      - "maps stages across the customer lifecycle"
      - "assigns goals and tactics per stage"
      - "identifies transition metrics"
    trigger_expected: true

  - id: negative_email_sequence
    prompt: "Write the exact onboarding and renewal emails."
    fixtures: []
    rubric:
      - "does not activate lifecycle strategy"
      - "email copy belongs to email-sequence"
    trigger_expected: false

  - id: negative_churn_flow
    prompt: "Design a cancellation save flow."
    fixtures: []
    rubric:
      - "does not activate broad lifecycle strategy"
      - "cancellation prevention belongs to churn-prevention"
    trigger_expected: false
