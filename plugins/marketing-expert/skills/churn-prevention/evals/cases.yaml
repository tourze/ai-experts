cases:
  - id: cancellation_save_flow
    prompt: "Design a cancellation flow that reduces churn without annoying users."
    fixtures: []
    rubric:
      - "diagnoses churn reasons and cancellation intent"
      - "proposes ethical save offers or downgrade paths"
      - "defines metrics such as save rate and post-save retention"
    trigger_expected: true

  - id: failed_payment_recovery
    prompt: "Our SaaS churn is driven by failed payments. Build a dunning and recovery strategy."
    fixtures: []
    rubric:
      - "addresses payment retry timing, messaging, and grace periods"
      - "segments failed-payment users from voluntary churn"
      - "defines recovery metrics and escalation logic"
    trigger_expected: true

  - id: negative_winback_emails
    prompt: "Write a win-back email sequence for users who cancelled last month."
    fixtures: []
    rubric:
      - "does not activate cancellation prevention workflow"
      - "post-cancellation email sequence belongs to email-sequence"
    trigger_expected: false

  - id: negative_onboarding_activation
    prompt: "Improve first-run onboarding so users reach the aha moment faster."
    fixtures: []
    rubric:
      - "does not activate churn prevention workflow"
      - "post-signup activation belongs to onboarding-cro"
    trigger_expected: false
