cases:
  - id: define_target_market
    prompt: "Use STP to define our market segments, target segment, and positioning statement."
    fixtures: []
    rubric:
      - "segments the market using meaningful criteria"
      - "selects target segments with rationale"
      - "creates a positioning direction or statement"
    trigger_expected: true

  - id: reposition_product
    prompt: "We are selling to too many audiences. Help us choose who to target and how to position."
    fixtures: []
    rubric:
      - "narrows target market rather than broadening by default"
      - "connects positioning to segment needs"
      - "explains tradeoffs of chosen target"
    trigger_expected: true

  - id: alternative_page
    prompt: "Write a 'HubSpot alternative' page for our CRM product."
    fixtures: []
    rubric:
      - "positions the product as an alternative to a named competitor"
      - "balances SEO capture with sales proof"
      - "handles comparison claims carefully"
    trigger_expected: true

  - id: versus_page
    prompt: "Create an A vs B comparison page for our project management app versus Asana."
    fixtures: []
    rubric:
      - "structures competitor comparison by buyer criteria"
      - "includes switching, migration, and differentiation angles"
      - "keeps claims specific and supportable"
    trigger_expected: true


  - id: negative_customer_value_tiers
    prompt: "Segment our existing customers by profitability and CLV tiers."
    fixtures: []
    rubric:
      - "does not activate STP market segmentation"
      - "customer value tiering belongs to customer-lifecycle"
    trigger_expected: false

  - id: negative_competitor_page
    prompt: "Write a competitor alternative page for a specific rival."
    fixtures: []
    rubric:
      - "does not activate STP workflow"
      - "competitor page writing belongs to competitor-alternatives"
    trigger_expected: false
