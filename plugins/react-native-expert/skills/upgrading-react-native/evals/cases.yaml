cases:
  - id: positive_upgrading_react_native_primary
    prompt: "我需要升级 React Native 或 Expo SDK 版本时使用。用户提到升级 RN、升级 Expo、rn-diff-purge、Upgrade Helper、0.x 到 0.y"
    fixtures: []
    rubric:
      - "recognizes the request as upgrading-react-native territory"
      - "uses the skill-specific workflow or domain criteria instead of giving a generic answer"
    trigger_expected: true

  - id: positive_upgrading_react_native_realistic
    prompt: "帮我处理这个场景：需要把 React Native 从一个 minor 版本升级到另一个 minor 版本。"
    fixtures: []
    rubric:
      - "matches a concrete use case described by the skill"
      - "keeps the response focused on the skill's domain boundary"
    trigger_expected: true

  - id: negative_adjacent_detox_mobile_test
    prompt: "这个需求应该交给 detox-mobile-test：为 React Native 应用编写或排查 Detox E2E 测试时使用。用户提到 Detox、RN E2E、移动端自动化、CI 上的 E2E 不稳定"
    fixtures: []
    rubric:
      - "adjacent detox-mobile-test requests should not trigger upgrading-react-native"
    trigger_expected: false

  - id: negative_general_unrelated_task
    prompt: "请帮我写一封简短的会议改期通知邮件"
    fixtures: []
    rubric:
      - "general writing or administrative requests are outside this skill"
    trigger_expected: false
