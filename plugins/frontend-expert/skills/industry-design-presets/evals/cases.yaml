    prompt: "我需要为某个行业产品（SaaS、Fintech、Healthcare、E-commerce、Portfolio、Gen-Z、Gaming 等）挑选设计方向、风格、配色、字体组合，或判断某个行业不该用哪些视觉语言时使用。"
    fixtures: []
    rubric:
      - "recognizes the request as industry-design-presets territory"
      - "uses the skill-specific workflow or domain criteria instead of giving a generic answer"
