cases:
  - id: positive_modern_web_design_primary
    prompt: "我需要需要规划或实现 2024-2025 风格的现代 Web 界面时使用。"
    fixtures: []
    rubric:
      - "recognizes the request as modern-web-design territory"
      - "uses the skill-specific workflow or domain criteria instead of giving a generic answer"
    trigger_expected: true

  - id: positive_modern_web_design_realistic
    prompt: "帮我处理这个场景：设计或重构品牌官网、产品页、营销页、活动页和高辨识度 Web App 界面。"
    fixtures: []
    rubric:
      - "matches a concrete use case described by the skill"
      - "keeps the response focused on the skill's domain boundary"
    trigger_expected: true

  - id: positive_modern_web_design_high_agency
    prompt: "这个产品官网太 AI 味了，帮我重设计成 premium、高辨识度、不要默认紫蓝渐变。"
    fixtures: []
    rubric:
      - "recognizes premium anti-template frontend work as modern-web-design territory"
      - "uses the high-agency protocol or equivalent visual direction constraints"
    trigger_expected: true

  - id: negative_adjacent_browser_rendering_patterns
    prompt: "这个需求应该交给 browser-rendering-patterns：优化浏览器渲染性能、处理 hydration 问题、使用 resource hints 或改善客户端事件处理时使用。用户提到 hydration mismatch、content-visibility、preload、preconnect、passive event listener、script defer、SVG 优化"
    fixtures: []
    rubric:
      - "adjacent browser-rendering-patterns requests should not trigger modern-web-design"
    trigger_expected: false

  - id: negative_general_unrelated_task
    prompt: "请帮我写一封简短的会议改期通知邮件"
    fixtures: []
    rubric:
      - "general writing or administrative requests are outside this skill"
    trigger_expected: false
