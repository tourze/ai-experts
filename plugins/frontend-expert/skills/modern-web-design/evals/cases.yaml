cases:
  - id: positive_style_selection_css
    prompt: "我要做一个 SaaS 落地页，想要 Glassmorphism 风格。帮我确认这个风格的关键 CSS 特征是什么，哪些场景不能用，然后给一个完整的 Hero 区域实现。"
    fixtures: []
    rubric:
      - "recognizes the request as modern-web-design territory"
      - "checks anti-applicability before implementing"
      - "implements all key CSS features of Glassmorphism, not just backdrop-filter"
      - "avoids AI-template look"
    trigger_expected: true

  - id: positive_performance_aware_design
    prompt: "设计一个品牌官网首页：需要高级感、叙事滚动，但不能影响 LCP 和移动端体验。给具体的方向定义和性能预算。"
    fixtures: []
    rubric:
      - "gives a one-sentence visual direction definition"
      - "sets explicit performance budget"
      - "avoids heavy visuals without budget"
      - "provides prefers-reduced-motion fallback"
    trigger_expected: true

  - id: positive_anti_ai_template
    prompt: "用户说这个落地页 '看起来像 AI 生成的'，帮我诊断问题：系统字体堆、紫色到粉色渐变背景、均匀圆角卡片墙、空洞口号。给改进方案。"
    fixtures: []
    rubric:
      - "recognizes AI-template look symptoms"
      - "recommends directional visuals instead of generic styling"
      - "references high-agency-protocol or equivalent guidance"
    trigger_expected: true

  - id: positive_style_catalog_lookup
    prompt: "我要做一个 fintech 产品的前端，想要看起来可信赖、专业，但又不能太沉闷。帮我从风格目录里推荐合适的 UI 风格，并说明哪些风格绝对不能用在金融产品上。"
    fixtures: []
    rubric:
      - "consults styles-catalog for candidate styles"
      - "filters by anti-applicability for fintech/banking"
      - "excludes Cyberpunk/Neubrutalism/Y2K for finance"
      - "recommends concrete style with CSS feature checklist"
    trigger_expected: true

  - id: negative_adjacent_interaction_design
    prompt: "这个需求应该交给 interaction-design：为按钮 hover、卡片 reveal、表单 focus 和导航过渡设计微交互动效，包含 easing 曲线和 duration 档位。"
    fixtures: []
    rubric:
      - "adjacent interaction-design requests should not trigger modern-web-design"
    trigger_expected: false

  - id: negative_general_unrelated
    prompt: "请帮我写一封简短的会议改期通知邮件"
    fixtures: []
    rubric:
      - "general writing or administrative requests are outside this skill"
    trigger_expected: false
