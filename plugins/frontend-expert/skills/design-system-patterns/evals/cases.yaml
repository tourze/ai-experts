    prompt: "我需要需要搭建设计令牌、主题系统或组件架构时使用。"
    fixtures: []
    rubric:
      - "recognizes the request as design-system-patterns territory"
      - "uses the skill-specific workflow or domain criteria instead of giving a generic answer"
    trigger_expected: true

  - id: positive_design_system_patterns_realistic
    prompt: "帮我处理这个场景：从零开始建立设计令牌、颜色体系、字号体系和组件 API。"
    fixtures: []
