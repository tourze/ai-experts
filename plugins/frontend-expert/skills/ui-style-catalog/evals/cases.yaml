cases:
  - id: positive_glassmorphism_traits
    prompt: "Explain Glassmorphism visual traits, CSS properties, prompt keywords, and when not to use it"
    fixtures: []
    rubric:
      - "identifies the named UI style"
      - "covers visual traits, CSS traits, prompt keywords, and anti-fit scenarios"
    trigger_expected: true

  - id: positive_saas_style_selection
    prompt: "Choose between Bento, Aurora, and Neubrutalism for a B2B SaaS dashboard and give prompt keywords"
    fixtures: []
    rubric:
      - "compares named UI styles for a product context"
      - "includes fit and non-fit guidance"
    trigger_expected: true

  - id: positive_visual_brief_concretizer_primary
    prompt: "客户一直说首页不够大气，但又说不清楚。我需要把“大气”拆成可执行的视觉 brief 和避坑清单。"
    fixtures: []
    rubric:
      - "recognizes abstract visual language as visual-brief-concretizer territory"
      - "translates the adjective into brand intent, visual signals, and anti-patterns"
    trigger_expected: true

  - id: positive_visual_brief_concretizer_realistic
    prompt: "帮我把这个 SaaS 官网改得更高级、更专业，不要只是说多留白，给我可以交给设计师的方向。"
    fixtures: []
    rubric:
      - "keeps the task focused on concretizing vague visual intent"
      - "asks or states assumptions about audience, carrier, brand intent, and evidence"
    trigger_expected: true


  - id: positive_visual_design_foundations_primary
    prompt: "我需要需要搭建排版、颜色、间距或图标体系等设计基础"
    fixtures: []
    rubric:
      - "recognizes the request as visual-design-foundations territory"
      - "uses the skill-specific workflow or domain criteria instead of giving a generic answer"
    trigger_expected: true

  - id: positive_visual_design_foundations_realistic
    prompt: "帮我处理这个场景：需要为新项目建立字体、颜色、间距、圆角、阴影等基础 token。"
    fixtures: []
    rubric:
      - "matches a concrete use case described by the skill"
      - "keeps the response focused on the skill's domain boundary"
    trigger_expected: true


  - id: negative_finished_poster
    prompt: "Create a finished poster for a music festival"
    fixtures: []
    rubric:
      - "finished static poster production should route to canvas-design"
    trigger_expected: false

  - id: negative_export_png_card
    prompt: "Generate a PNG card showing these three product benefits"
    fixtures: []
    rubric:
      - "static image export should route to concept-to-image"
    trigger_expected: false
