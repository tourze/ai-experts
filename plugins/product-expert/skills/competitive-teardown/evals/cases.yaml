cases:
  - id: teardown_competitor
    prompt: "Do a competitive teardown of Linear vs Jira for engineering project management"
    fixtures: []
    rubric:
      - "evaluates both products across consistent dimensions (UX, features, pricing, integrations)"
      - "produces a scoring matrix with evidence-backed ratings"
      - "identifies differentiation opportunities and gap analysis"
    trigger_expected: true

  - id: quarterly_competitive_review
    prompt: "Analyze our top 3 competitors' recent product launches and pricing changes"
    fixtures: []
    rubric:
      - "structures analysis by competitor with recent changes timeline"
      - "identifies positioning shifts and strategic implications"
      - "produces actionable recommendations for our product roadmap"
    trigger_expected: true

  - id: negative_build_feature
    prompt: "Build a feature comparison page for our marketing website"
    fixtures: []
    rubric:
      - "does not activate competitive teardown workflow"
      - "building a marketing page is an implementation task, not competitive analysis"
    trigger_expected: false
