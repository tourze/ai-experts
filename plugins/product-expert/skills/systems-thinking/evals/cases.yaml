cases:
  - id: positive_systems_thinking_primary
    prompt: "我需要分析多方参与、激励错位、二阶效应或复杂系统动态时使用；帮助识别结构、反馈回路、杠杆点与系统性副作用。"
    fixtures: []
    rubric:
      - "recognizes the request as systems-thinking territory"
      - "uses the skill-specific workflow or domain criteria instead of giving a generic answer"
    trigger_expected: true

  - id: positive_systems_thinking_realistic
    prompt: "帮我处理这个场景：平台策略、组织协作、复杂业务链路、生态位博弈或长期副作用分析。"
    fixtures: []
    rubric:
      - "matches a concrete use case described by the skill"
      - "keeps the response focused on the skill's domain boundary"
    trigger_expected: true

  - id: negative_adjacent_3c_strategic_triangle
    prompt: "这个需求应该交给 3c-strategic-triangle：从顾客、公司、竞争者三角度做战略分析、找差异化定位或评估竞争可持续性时使用；英文触发词 3C analysis、Ohmae 3C、customer-company-competitor、strategic triangle。"
    fixtures: []
    rubric:
      - "adjacent 3c-strategic-triangle requests should not trigger systems-thinking"
    trigger_expected: false

  - id: negative_general_unrelated_task
    prompt: "请帮我写一封简短的会议改期通知邮件"
    fixtures: []
    rubric:
      - "general writing or administrative requests are outside this skill"
    trigger_expected: false
