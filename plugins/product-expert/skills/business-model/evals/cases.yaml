cases:
  - id: positive_business_model_primary
    prompt: "帮我把一个 AI 客服新想法设计成 3-5 个商业模式选项，比较低摩擦、高毛利和高壁垒路径，并写清收入公式和验证计划。"
    fixtures: []
    rubric:
      - "recognizes the request as business-model territory"
      - "selects idea_to_model branch"
      - "includes evidence tiers, market environment, formula ranges, and validation plan"
    trigger_expected: true

  - id: positive_business_model_realistic
    prompt: "诊断这个 SaaS 网站的商业模式：当前怎么收费、还有哪些变现层，直接竞品和跨行业 analog 各给一批，并评估 AI credits 的机会。"
    fixtures: []
    rubric:
      - "selects model_diagnosis branch"
      - "distinguishes facts, estimates, hypotheses, and recommendations"
      - "covers direct competitors, cross-industry analogs, AI leverage, and upgrade recommendations"
    trigger_expected: true

  - id: positive_company_case_study
    prompt: "研究 HubSpot 的商业模式，拆解利润池、环境优势、可迁移模式和哪些经验不适合直接复制。"
    fixtures: []
    rubric:
      - "selects company_case_study branch"
      - "separates transferable patterns from environment-dependent advantages"
      - "uses official or high-tier evidence for major claims when available"
    trigger_expected: true

  - id: positive_business_model_report_contract
    prompt: "请用 JSON 和 HTML 报告契约输出一家 AI 写作 SaaS 的商业模式诊断，字段要能给前端渲染。"
    fixtures: []
    rubric:
      - "selects model_diagnosis branch"
      - "includes the shared JSON fields and branch-specific fields from the report contract"
      - "keeps HTML modules in the documented order, including evidence map, competitors, analogs, AI fit, risk, and appendix"
    trigger_expected: true

  - id: positive_weizhu_primary
    prompt: "我需要从中国商业环境视角分析商业模式、梳理定位到企业价值的因果逻辑链、或做商业模式创新设计时使用；英文触发词 Wei Zhu model、six elements、business model logic chain、Chinese business model。"
    fixtures: []
    rubric:
      - "recognizes the request as business-model territory (weizhu sub-model)"
      - "uses the skill-specific workflow or domain criteria instead of giving a generic answer"
    trigger_expected: true

  - id: positive_weizhu_realistic
    prompt: "帮我处理这个场景：中国市场商业模式设计和诊断（比 BMC 更强调因果逻辑）。"
    fixtures: []
    rubric:
      - "matches a concrete use case described by the skill"
      - "keeps the response focused on the skill's domain boundary"
    trigger_expected: true

  - id: positive_iron_triangle_primary
    prompt: "我需要从产品、核心业务职能、市场三维度审视业务定位一致性、或判断商业模式是否自洽时使用；英文触发词 business iron triangle、product-function-market、business definition、Abell's three dimensions。"
    fixtures: []
    rubric:
      - "recognizes the request as business-model territory (iron-triangle sub-model)"
      - "uses the skill-specific workflow or domain criteria instead of giving a generic answer"
    trigger_expected: true

  - id: positive_iron_triangle_realistic
    prompt: "帮我处理这个场景：快速检验业务定位是否自洽：产品、职能和市场三者是否相互支撑。"
    fixtures: []
    rubric:
      - "matches a concrete use case described by the skill"
      - "keeps the response focused on the skill's domain boundary"
    trigger_expected: true

  - id: negative_adjacent_3c_strategic_triangle
    prompt: "这个需求应该交给 3c-strategic-triangle：从顾客、公司、竞争者三角度做战略分析、找差异化定位或评估竞争可持续性时使用；英文触发词 3C analysis、Ohmae 3C、customer-company-competitor、strategic triangle。"
    fixtures: []
    rubric:
      - "adjacent 3c-strategic-triangle requests should not trigger business-model"
    trigger_expected: false

  - id: negative_general_unrelated_task
    prompt: "请帮我写一封简短的会议改期通知邮件"
    fixtures: []
    rubric:
      - "general writing or administrative requests are outside this skill"
    trigger_expected: false
