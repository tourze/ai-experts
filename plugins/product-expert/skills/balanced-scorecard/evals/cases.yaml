cases:
  - id: positive_balanced_scorecard_primary
    prompt: "我需要设计绩效评估体系、战略执行监控、KPI 体系搭建或从财务/客户/流程/学习四维度评价企业时使用；英文触发词 balanced scorecard、BSC、KPI framework、strategy map、four perspectives。"
    fixtures: []
    rubric:
      - "recognizes the request as balanced-scorecard territory"
      - "uses the skill-specific workflow or domain criteria instead of giving a generic answer"
