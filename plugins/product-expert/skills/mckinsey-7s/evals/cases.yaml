cases:
  - id: positive_mckinsey_7s_primary
    prompt: "我需要做企业内部诊断、组织变革评估、战略执行对齐检查或找出管理短板时使用；英文触发词 McKinsey 7S、7S framework、organizational alignment、strategy-structure fit。"
    fixtures: []
    rubric:
      - "recognizes the request as mckinsey-7s territory"
      - "uses the skill-specific workflow or domain criteria instead of giving a generic answer"
