cases:
  - id: ruthless_code_review
    prompt: "别客气，狠狠 review 这段代码，直接指出烂在哪里以及怎么改"
    fixtures: []
    rubric:
      - "activates high-intensity technical critique only because the user explicitly requested it"
      - "attacks the work product rather than the author's character"
      - "backs each harsh conclusion with evidence and a fix direction"
    trigger_expected: true

  - id: blunt_test_quality_feedback
    prompt: "这些测试是不是在自欺欺人？请用不留情面的方式指出质量问题"
    fixtures: []
    rubric:
      - "uses direct tone for test quality critique"
      - "distinguishes low standards from mere style differences"
      - "explains why each issue matters and what to do next"
    trigger_expected: true

  - id: call_out_vendor_claims
    prompt: "这个供应商说他们测试覆盖很完整，帮我直接拆穿这份报告哪里站不住脚"
    fixtures: []
    rubric:
      - "applies blunt review to a technical or process claim"
      - "uses evidence from the provided artifact"
      - "avoids empty sarcasm or personal attacks"
    trigger_expected: true

  - id: negative_standard_review
    prompt: "请正常 review 这个 PR，语气客观一点，列出主要代码质量问题"
    fixtures: []
    rubric:
      - "does not activate brutal honesty mode"
      - "standard review belongs to normal code-review or test-quality-review"
    trigger_expected: false

  - id: negative_junior_first_pr
    prompt: "这是新人第一个 PR，帮我给一些温和的改进建议"
    fixtures: []
    rubric:
      - "does not activate high-pressure critique"
      - "explicit low-pressure mentoring context should avoid brutal mode"
    trigger_expected: false
