cases:
  - id: expand_after_bug
    prompt: "这个重复提交 bug 暴露出测试不足，帮我 brainstorm 同类场景应该补哪些测试"
    fixtures: []
    rubric:
      - "starts from the original bug type and root cause"
      - "expands into related test cases rather than only one regression"
      - "labels candidate cases by priority and test layer"
    trigger_expected: true

  - id: missing_path_family
    prompt: "代码评审发现权限失败路径没测，帮我顺藤摸瓜找同类漏测"
    fixtures: []
    rubric:
      - "treats the task as test gap expansion"
      - "covers related entry points, states, data flow, integration boundaries, or timing factors"
      - "avoids generic 'write more tests' advice"
    trigger_expected: true

  - id: high_risk_module_bug_family
    prompt: "发布前我们发现一个缓存失效 bug，帮我列出同根因 bug 家族的补测清单"
    fixtures: []
    rubric:
      - "links new test ideas to the same root cause family"
      - "prioritizes high-probability and high-impact cases"
      - "chooses unit, integration, or E2E layers intentionally"
    trigger_expected: true

  - id: negative_general_strategy
    prompt: "为我们的微服务平台设计整体测试策略和质量门"
    fixtures: []
    rubric:
      - "does not activate bug-family brainstorm"
      - "broad strategy belongs to test-strategy"
    trigger_expected: false

  - id: negative_tdd_new_feature
    prompt: "用 TDD 写一个购物车折扣计算器，先写失败测试"
    fixtures: []
    rubric:
      - "does not activate post-bug brainstorming"
      - "new feature red-green-refactor belongs to test-driven-development"
    trigger_expected: false
