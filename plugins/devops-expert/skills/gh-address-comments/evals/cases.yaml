cases:
  - id: positive_gh_address_comments_primary
    prompt: "我需要需要用 gh CLI 拉取当前分支关联 PR 的评论、归类待处理项并推进修复"
    fixtures: []
    rubric:
      - "recognizes the request as gh-address-comments territory"
      - "uses the skill-specific workflow or domain criteria instead of giving a generic answer"
    trigger_expected: true

  - id: positive_gh_address_comments_realistic
    prompt: "帮我处理这个场景：处理 reviewer 评论、review thread 和顶层 issue comment。"
    fixtures: []
    rubric:
      - "matches a concrete use case described by the skill"
      - "keeps the response focused on the skill's domain boundary"
    trigger_expected: true

  - id: negative_adjacent_create_github_action_workflow_specificat
    prompt: "这个需求应该交给 create-github-action-workflow-specification：需要把现有 GitHub Actions 工作流整理成实现无关、便于维护的规范文档"
    fixtures: []
    rubric:
      - "adjacent create-github-action-workflow-specification requests should not trigger gh-address-comments"
    trigger_expected: false

  - id: negative_general_unrelated_task
    prompt: "请帮我写一封简短的会议改期通知邮件"
    fixtures: []
    rubric:
      - "general writing or administrative requests are outside this skill"
    trigger_expected: false
