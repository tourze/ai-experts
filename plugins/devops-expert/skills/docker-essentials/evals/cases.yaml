cases:
  - id: optimize_dockerfile
    prompt: "My Docker image is 2.3GB, help me reduce the size and speed up builds"
    fixtures: []
    rubric:
      - "recommends multi-stage builds to separate build and runtime"
      - "suggests smaller base images (alpine, distroless, slim)"
      - "covers layer caching optimization and .dockerignore configuration"
    trigger_expected: true

  - id: docker_compose_networking
    prompt: "My containers can't talk to each other in Docker Compose, the backend can't reach the database"
    fixtures: []
    rubric:
      - "troubleshoots Docker network configuration and service names"
      - "explains DNS resolution via service names within compose networks"
      - "covers depends_on, healthchecks, and connection retry patterns"
    trigger_expected: true

  - id: negative_kubernetes_deployment
    prompt: "Help me create a Kubernetes Deployment manifest with rolling update strategy"
    fixtures: []
    rubric:
      - "does not activate docker essentials workflow"
      - "Kubernetes orchestration is a separate domain from Docker container management"
    trigger_expected: false

  - id: negative_cloud_infra
    prompt: "Set up a VPC with public and private subnets on AWS"
    fixtures: []
    rubric:
      - "does not activate docker essentials workflow"
      - "cloud infrastructure provisioning is not Docker container management"
    trigger_expected: false
