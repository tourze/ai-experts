cases:
  - id: positive_typescript_advanced_types_primary
    prompt: "我需要当你需要实现复杂泛型、条件类型、映射类型、模板字面量类型，或为库/API 设计稳定的类型工具时使用。目标是把“类型能表达什么”落实为可维护的工程模式。"
    fixtures: []
    rubric:
      - "recognizes the request as typescript-advanced-types territory"
      - "uses the skill-specific workflow or domain criteria instead of giving a generic answer"
    trigger_expected: true

  - id: positive_typescript_advanced_types_realistic
    prompt: "帮我处理这个场景：需要给公共函数、组件或 SDK 设计可复用的泛型 API。"
    fixtures: []
    rubric:
      - "matches a concrete use case described by the skill"
      - "keeps the response focused on the skill's domain boundary"
    trigger_expected: true

  - id: negative_adjacent_offensive_typesafety
    prompt: "这个需求应该交给 offensive-typesafety：在搭建新的 TypeScript 技术栈、设计路由/API/数据库边界，或把字符串协议升级为编译器可验证合同的时候使用。"
    fixtures: []
    rubric:
      - "adjacent offensive-typesafety requests should not trigger typescript-advanced-types"
    trigger_expected: false

  - id: negative_general_unrelated_task
    prompt: "请帮我写一封简短的会议改期通知邮件"
    fixtures: []
    rubric:
      - "general writing or administrative requests are outside this skill"
    trigger_expected: false
