cases:
  - id: run_static_quality_gate
    prompt: "Detect the project stack and run whatever static checks are available before implementation."
    fixtures: []
    rubric:
      - "detects available tooling from project configuration"
      - "runs only checks that are present in the environment"
      - "summarizes failures by severity and next action"
    trigger_expected: true

  - id: lint_typecheck_gate
    prompt: "Use the Spec Kit checker to run lint, typecheck, and compile checks for this feature branch."
    fixtures: []
    rubric:
      - "selects commands such as eslint, ruff, mypy, clippy, or equivalent when configured"
      - "distinguishes missing tools from real failures"
      - "orders fixes by P0/P1/P2 risk"
    trigger_expected: true

  - id: negative_execute_tests
    prompt: "Run the test suite with coverage and summarize failing tests."
    fixtures: []
    rubric:
      - "does not activate static-check workflow"
      - "running tests is the implementer's responsibility, not static checking"
    trigger_expected: false

  - id: negative_validate_requirements
    prompt: "Validate whether the implementation satisfies the spec requirements."
    fixtures: []
    rubric:
      - "does not activate checker workflow"
      - "requirements validation belongs to speckit-validate"
    trigger_expected: false
