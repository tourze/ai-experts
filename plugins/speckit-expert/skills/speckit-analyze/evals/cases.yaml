cases:
  - id: analyze_spec_plan_tasks_consistency
    prompt: "Analyze the current Spec Kit feature for inconsistencies between spec.md, plan.md, and tasks.md."
    fixtures: []
    rubric:
      - "checks spec, plan, and tasks against each other"
      - "flags contradictions, duplicate work, gaps, and sequencing problems"
      - "keeps analysis read-only and evidence-based"
    trigger_expected: true

  - id: analyze_after_task_generation
    prompt: "Tasks are generated. Run a read-only consistency audit before we start implementation."
    fixtures: []
    rubric:
      - "treats the task list as complete enough for cross-document analysis"
      - "prioritizes findings by implementation risk"
      - "does not rewrite the source documents without request"
    trigger_expected: true

  - id: negative_generate_tasks
    prompt: "Generate tasks.md from this spec and plan."
    fixtures: []
    rubric:
      - "does not activate analysis workflow"
      - "task generation belongs to speckit-tasks"
    trigger_expected: false

  - id: negative_code_review
    prompt: "Review this code diff for bugs and security issues."
    fixtures: []
    rubric:
      - "does not activate Spec Kit document consistency analysis"
      - "code review belongs to speckit-reviewer"
    trigger_expected: false
