cases:
  - id: run_tests_with_coverage
    prompt: "Run the test suite for the current Spec Kit feature and summarize coverage and failures."
    fixtures: []
    rubric:
      - "detects the available test framework"
      - "runs the appropriate test command with coverage when available"
      - "summarizes pass, fail, coverage, and directly fixable failures"
    trigger_expected: true

  - id: framework_aware_test_run
    prompt: "Detect whether this repo uses Jest, Vitest, Pytest, Go test, or Cargo test and run the matching tests."
    fixtures: []
    rubric:
      - "detects framework from project files"
      - "does not invent unavailable commands"
      - "orders failures by likely fixability"
    trigger_expected: true

  - id: negative_static_lint
    prompt: "Run lint and type checks only."
    fixtures: []
    rubric:
      - "does not activate test runner workflow"
      - "static checks belong to speckit-checker"
    trigger_expected: false

  - id: negative_validate_spec
    prompt: "Compare implementation against the spec and identify unmet requirements."
    fixtures: []
    rubric:
      - "does not activate test execution workflow"
      - "requirements validation belongs to speckit-validate"
    trigger_expected: false
