cases:
  - id: generate_dependency_ordered_tasks
    prompt: "Generate tasks.md from the current spec and plan with dependencies and parallel markers."
    fixtures: []
    rubric:
      - "reads spec.md and plan.md before creating tasks"
      - "groups tasks by independently verifiable user story"
      - "marks dependencies and parallelizable items"
    trigger_expected: true

  - id: tasks_from_design_artifacts
    prompt: "Turn the feature design artifacts into an implementation task list with tests for each story."
    fixtures: []
    rubric:
      - "uses data model, contracts, research, and quickstart when available"
      - "ensures each story can be independently tested"
      - "keeps task granularity suitable for implementation"
    trigger_expected: true

  - id: negative_execute_tasks
    prompt: "Start implementing all tasks in tasks.md now."
    fixtures: []
    rubric:
      - "does not activate task generation workflow"
      - "executing tasks belongs to speckit-implement"
    trigger_expected: false

  - id: negative_requirement_checklist
    prompt: "Create a quality checklist for the spec requirements."
    fixtures: []
    rubric:
      - "does not activate tasks workflow"
      - "requirements checklist belongs to speckit-checklist"
    trigger_expected: false
