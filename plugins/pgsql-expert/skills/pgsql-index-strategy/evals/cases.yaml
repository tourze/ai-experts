    prompt: "我需要设计或审查 PostgreSQL B-tree、GIN、GiST、部分索引或表达式索引"
    fixtures: []
    rubric:
      - "recognizes the request as pgsql-index-strategy territory"
      - "uses the skill-specific workflow or domain criteria instead of giving a generic answer"
    trigger_expected: true

  - id: positive_pgsql_index_strategy_realistic
    prompt: "帮我处理这个场景：为新表或慢查询设计索引，需要在 B-tree、GIN、GiST 之间做选择"
    fixtures: []
