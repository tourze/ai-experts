cases:
  - id: positive_pgsql_partitioning_primary
    prompt: "我需要设计或验证 PostgreSQL 声明式分区、分区裁剪或分区生命周期管理时使用。适用于时序和大表治理。"
    fixtures: []
    rubric:
      - "recognizes the request as pgsql-partitioning territory"
      - "uses the skill-specific workflow or domain criteria instead of giving a generic answer"
    trigger_expected: true

  - id: positive_pgsql_partitioning_realistic
    prompt: "帮我处理这个场景：时序数据按时间 RANGE 分区，实现高效裁剪和历史归档"
    fixtures: []
    rubric:
      - "matches a concrete use case described by the skill"
      - "keeps the response focused on the skill's domain boundary"
    trigger_expected: true

  - id: negative_adjacent_pgsql_index_strategy
    prompt: "这个需求应该交给 pgsql-index-strategy：设计或审查 PostgreSQL B-tree、GIN、GiST、部分索引或表达式索引"
    fixtures: []
    rubric:
      - "adjacent pgsql-index-strategy requests should not trigger pgsql-partitioning"
    trigger_expected: false

  - id: negative_adjacent_pgsql_schema_design
