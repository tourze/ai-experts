cases:
  - id: positive_pgsql_schema_design_primary
    prompt: "我需要设计或审查 PostgreSQL 表结构、原生类型、约束或命名规范"
    fixtures: []
    rubric:
      - "recognizes the request as pgsql-schema-design territory"
      - "uses the skill-specific workflow or domain criteria instead of giving a generic answer"
    trigger_expected: true

  - id: positive_pgsql_schema_design_realistic
    prompt: "帮我处理这个场景：新建业务表或审查已有表结构，需要选择 PostgreSQL 原生类型"
    fixtures: []
    rubric:
      - "matches a concrete use case described by the skill"
      - "keeps the response focused on the skill's domain boundary"
    trigger_expected: true

  - id: negative_adjacent_pgsql_index_strategy
    prompt: "这个需求应该交给 pgsql-index-strategy：设计或审查 PostgreSQL B-tree、GIN、GiST、部分索引或表达式索引"
    fixtures: []
    rubric:
      - "adjacent pgsql-index-strategy requests should not trigger pgsql-schema-design"
    trigger_expected: false

  - id: negative_adjacent_pgsql_partitioning
    prompt: "请为 2 亿行时序事件表设计 PostgreSQL RANGE 分区、DEFAULT 分区和历史分区归档策略。"
    fixtures: []
    rubric:
      - "partitioning and lifecycle requests should not trigger pgsql-schema-design"
    trigger_expected: false

  - id: negative_adjacent_pgsql_row_level_security
    prompt: "请为共享多租户 project 表实现 RLS 策略，要求 FORCE RLS、USING、WITH CHECK 和 SET LOCAL tenant_id。"
    fixtures: []
    rubric:
      - "row-level security policy requests should not trigger pgsql-schema-design"
    trigger_expected: false

  - id: negative_general_unrelated_task
    prompt: "请帮我写一封简短的会议改期通知邮件"
    fixtures: []
    rubric:
      - "general writing or administrative requests are outside this skill"
    trigger_expected: false
