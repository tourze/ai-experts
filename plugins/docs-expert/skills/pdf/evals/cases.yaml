cases:
  - id: fill_pdf_form
    prompt: "I need to fill out this PDF form programmatically with data from a JSON file"
    fixtures: []
    rubric:
      - "identifies form fields in the PDF document"
      - "maps JSON data to PDF form fields"
      - "produces a filled PDF with correct field values and formatting"
    trigger_expected: true

  - id: extract_pdf_structure
    prompt: "Read this PDF invoice and extract the line items, totals, and vendor information"
    fixtures: []
    rubric:
      - "parses PDF structure to locate tables and text blocks"
      - "extracts structured data with field labels and values"
      - "handles multi-page documents and varied layouts"
    trigger_expected: true

  - id: positive_pdf_extraction_primary
    prompt: "我需要从 PDF 中抽取文本、表格、页级结构或元数据时使用；不负责表单填写或版式回写。"
    fixtures: []
    rubric:
      - "recognizes the request as pdf-extraction territory"
      - "uses the skill-specific workflow or domain criteria instead of giving a generic answer"
    trigger_expected: true

  - id: positive_pdf_extraction_realistic
    prompt: "帮我处理这个场景：用户要从 PDF 中提取正文、表格、页码、元数据或局部区域内容。"
    fixtures: []
    rubric:
      - "matches a concrete use case described by the skill"
      - "keeps the response focused on the skill's domain boundary"
    trigger_expected: true


  - id: negative_create_document
    prompt: "Write a technical design document for our new authentication system"
    fixtures: []
    rubric:
      - "does not activate PDF workflow"
      - "writing a design document from scratch is a content creation task, not PDF processing"
    trigger_expected: false
