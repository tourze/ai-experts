cases:
  - id: design_audit_log_table
    prompt: "Design a PostgreSQL table for storing audit logs with user actions, timestamps, and metadata"
    fixtures: []
    rubric:
      - "uses appropriate PG types: timestamptz, jsonb for metadata, uuid or bigint PK"
      - "applies constraints: NOT NULL on required fields, check constraints where relevant"
      - "considers partitioning strategy for time-series audit data"
    trigger_expected: true

  - id: multi_tenant_schema
    prompt: "How should I structure PostgreSQL tables for a multi-tenant app with row-level security?"
    fixtures: []
    rubric:
      - "discusses tenant_id column placement and foreign key design"
      - "covers RLS policies with CREATE POLICY for tenant isolation"
      - "addresses index design including tenant_id as prefix"
    trigger_expected: true

  - id: negative_query_tuning
    prompt: "My PostgreSQL SELECT query with 3 JOINs is too slow, show me how to optimize it"
    fixtures: []
    rubric:
      - "does not activate postgresql table design workflow"
      - "query optimization is a performance tuning task, not table design"
    trigger_expected: false
