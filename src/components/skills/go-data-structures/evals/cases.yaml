cases:
  - id: slice_capacity_growth
    prompt: "Go 里反复 append 到一个 slice，cap 怎么变化？我想预估分配次数来优化性能"
    fixtures: []
    rubric:
      - "触发 go-data-structures"
      - "说明 cap < 256 翻倍、>= 256 按 1.25x+192 增长"
      - "建议大小已知时预分配 make([]T, 0, n)"
    trigger_expected: true

  - id: map_delete_memory
    prompt: "线上 Go 服务中一个 map 反复增删 key，RSS 只涨不降，怎么处理？"
    fixtures: []
    rubric:
      - "触发 go-data-structures"
      - "指出 map 不缩容，删除后桶内存不释放"
      - "建议重建 map 或分段替换"
    trigger_expected: true

  - id: negative_error_wrap
    prompt: "Go 项目里怎么用 errors.Is 和 errors.As 做错误匹配和错误链拆解？"
    fixtures: []
    rubric:
      - "不触发 go-data-structures"
      - "错误处理属于 go-error-handling"
    trigger_expected: false

  - id: negative_graceful_shutdown
    prompt: "Go 服务如何实现优雅停机，确保所有 goroutine 在收到信号后都能退出？"
    fixtures: []
    rubric:
      - "不触发 go-data-structures"
      - "优雅停机属于 go-concurrency-patterns"
    trigger_expected: false
