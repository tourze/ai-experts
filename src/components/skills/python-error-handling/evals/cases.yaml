cases:
  - id: positive_python_error_handling_primary
    prompt: "我需要设计 Python 异常层级、处理 TypeError / ValueError / KeyError / AttributeError / IndexError 等内置异常、做输入校验边界、批处理部分失败治理或规范 try/except 纪律"
    fixtures: []
    rubric:
      - "recognizes the request as python-error-handling territory"
      - "uses the skill-specific workflow or domain criteria instead of giving a generic answer"
    trigger_expected: true

  - id: positive_python_error_handling_realistic
    prompt: "帮我处理这个场景：API、CLI、任务 worker 需要稳定处理坏输入和外部依赖失败。"
    fixtures: []
    rubric:
      - "matches a concrete use case described by the skill"
      - "keeps the response focused on the skill's domain boundary"
    trigger_expected: true

  - id: negative_adjacent_async_python_patterns
    prompt: "这个需求应该交给 async-python-patterns：实现 asyncio、async/await、TaskGroup、timeout、cancellation、并发 I/O 或异步 API"
    fixtures: []
    rubric:
      - "adjacent async-python-patterns requests should not trigger python-error-handling"
    trigger_expected: false

  - id: negative_general_unrelated_task
    prompt: "请帮我写一封简短的会议改期通知邮件"
    fixtures: []
    rubric:
      - "general writing or administrative requests are outside this skill"
    trigger_expected: false
