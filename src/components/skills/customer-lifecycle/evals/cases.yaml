cases:
  - id: customer_value_tiering
    prompt: "Segment our customers into value tiers and design different service strategies for each."
    fixtures: []
    rubric:
      - "uses customer value or profitability tiers"
      - "distinguishes high-value, mid-value, and low-value segments"
      - "recommends differential treatment by tier"
    trigger_expected: true

  - id: clv_structure_health
    prompt: "Diagnose whether our customer base is healthy using a customer pyramid model."
    fixtures: []
    rubric:
      - "assesses customer distribution by CLV or profitability"
      - "identifies overdependence or low-value concentration"
      - "suggests movement strategies between tiers"
    trigger_expected: true

  - id: lifecycle_stage_strategy
    prompt: "Analyze our product lifecycle stage and recommend marketing strategy for maturity."
    fixtures: []
    rubric:
      - "identifies lifecycle stage such as introduction, growth, maturity, or decline"
      - "matches marketing strategy to the stage"
      - "distinguishes product lifecycle from customer lifecycle when relevant"
    trigger_expected: true

  - id: customer_lifecycle_campaigns
    prompt: "Plan lifecycle marketing across trial, activation, expansion, renewal, and win-back."
    fixtures: []
    rubric:
      - "maps stages across the customer lifecycle"
      - "assigns goals and tactics per stage"
      - "identifies transition metrics"
    trigger_expected: true

  - id: cancellation_save_flow
    prompt: "Design a cancellation flow that reduces churn without annoying users."
    fixtures: []
    rubric:
      - "diagnoses churn reasons and cancellation intent"
      - "proposes ethical save offers or downgrade paths"
      - "defines metrics such as save rate and post-save retention"
    trigger_expected: true

  - id: failed_payment_recovery
    prompt: "Our SaaS churn is driven by failed payments. Build a dunning and recovery strategy."
    fixtures: []
    rubric:
      - "addresses payment retry timing, messaging, and grace periods"
      - "segments failed-payment users from voluntary churn"
      - "defines recovery metrics and escalation logic"
    trigger_expected: true


  - id: referral_program_design
    prompt: "Help me design a referral program for our SaaS product. We're a $49/month project management tool with about 1,000 customers. We want to encourage word-of-mouth growth."
    fixtures: []
    rubric:
      - "Checks for product-marketing-context.md"
      - "Distinguishes referral from affiliate"
      - "Designs the referral loop (trigger, share, convert, reward)"
      - "Recommends double-sided incentive structure"
      - "Suggests specific incentives for the price point"
      - "Includes launch checklist"
      - "Recommends tool integrations"
    trigger_expected: true
  - id: referral_participation_optimization
    prompt: "We have a referral program but only 5% of customers have ever referred someone. How do we increase participation?"
    fixtures: []
    rubric:
      - "Applies program optimization guidance"
      - "Diagnoses potential causes of low participation"
      - "Checks awareness, timing, incentive, and friction"
      - "Recommends optimization tactics"
      - "Suggests timing referral asks at satisfaction moments"
      - "Provides experiment ideas"
    trigger_expected: true
  - id: referral_vs_affiliate_decision
    prompt: "should we do referral or affiliate? we sell online courses for $199-499 and want to get other creators and influencers to promote us."
    fixtures: []
    rubric:
      - "Triggers on casual phrasing"
      - "Clearly distinguishes referral from affiliate"
      - "Recommends affiliate for this use case"
      - "Provides commission structure guidance for courses"
      - "Addresses cookie duration and payout terms"
      - "Recommends appropriate affiliate platforms"
    trigger_expected: true
  - id: referral_incentive_redesign
    prompt: "What incentive structure works best? We've been offering $10 off for referrers but it's not working. Our product is $29/month."
    fixtures: []
    rubric:
      - "Evaluates current incentive structure"
      - "Identifies as single-sided and recommends double-sided"
      - "Discusses multiple incentive types"
      - "Applies tiered incentive concept"
      - "Provides specific alternatives to test"
      - "Notes incentive may not be the only issue"
    trigger_expected: true
  - id: referral_program_metrics
    prompt: "How do we measure the success of our referral program? What metrics should we track?"
    fixtures: []
    rubric:
      - "Applies measuring success framework"
      - "Defines participation rate, share rate, conversion rate"
      - "Includes viral coefficient / k-factor"
      - "Compares referral CAC to other channels"
      - "Compares referred customer LTV to organic"
      - "Recommends tracking approach"
      - "Provides benchmark ranges"
    trigger_expected: true
  - id: referral_email_template_boundary
    prompt: "Can you write the referral invitation emails? I need the email that goes out when someone shares their referral link."
    fixtures: []
    rubric:
      - "Applies referral email section from the skill"
      - "Provides referral invitation email guidance"
      - "Notes broader nurture design is outside this skill's main scope"
      - "Provides specific referral email copy or template"
    trigger_expected: true

  - id: trial_welcome_sequence
    prompt: "Create a five-email welcome sequence for new SaaS trial users to drive activation."
    fixtures: []
    rubric:
      - "maps emails to lifecycle and activation goals"
      - "sets timing, purpose, subject, body angle, and CTA per email"
      - "distinguishes lifecycle nurturing from cold outbound"
    trigger_expected: true

  - id: re_engagement_drip
    prompt: "Design a re-engagement email flow for inactive users who stopped using the product after signup."
    fixtures: []
    rubric:
      - "segments inactive users by behavior or lifecycle stage"
      - "uses appropriate reactivation messages and timing"
      - "includes measurement or experiment ideas"
    trigger_expected: true


  - id: negative_market_segmentation
    prompt: "Define our target market and positioning statement."
    fixtures: []
    rubric:
      - "does not activate customer-lifecycle"
      - "market segmentation belongs to stp-segmentation"
    trigger_expected: false

  - id: negative_email_sequence
    prompt: "Write the exact onboarding and renewal emails."
    fixtures: []
    rubric:
      - "does not activate customer-lifecycle strategy"
      - "email copy belongs to email-sequence"
    trigger_expected: false

  - id: negative_churn_save_flow
    prompt: "Design a cancellation save flow to reduce churn."
    fixtures: []
    rubric:
      - "does not activate customer-lifecycle"
      - "churn workflows belong to churn-prevention"
    trigger_expected: false
