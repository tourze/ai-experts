  - id: negative_grade_expectations
    prompt: "根据 transcript 和 outputs 逐条判断这些 expectations 是否通过。"
    fixtures: []
    rubric:
      - "does not replace expectation grading with A/B comparison"
      - "routes transcript/output expectation grading to skill-eval-grader"
    trigger_expected: false
