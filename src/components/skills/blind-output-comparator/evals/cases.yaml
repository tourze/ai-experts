cases:
  - id: compare_two_outputs
    prompt: "这里有 A 和 B 两个匿名输出，以及原始任务要求，请你盲评哪个更好。"
    fixtures: []
    rubric:
      - "keeps A/B source blind and judges only output quality"
      - "creates a task-specific rubric"
      - "chooses A, B, or TIE with concrete reasoning"
