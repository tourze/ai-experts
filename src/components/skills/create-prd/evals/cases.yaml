cases:
  - id: create_feature_prd
    prompt: "Write a PRD for adding team collaboration features to our project management tool"
    fixtures: []
    rubric:
      - "includes problem statement, target users, and success metrics"
      - "defines functional requirements with user stories or use cases"
      - "covers constraints, dependencies, and phased release plan"
    trigger_expected: true

  - id: create_prd_from_idea
    prompt: "I have an idea for an AI-powered code review tool, help me write the product requirements document"
    fixtures: []
    rubric:
      - "clarifies the problem space and target persona before requirements"
      - "defines scope boundaries and non-goals"
      - "produces actionable requirements with acceptance criteria"
    trigger_expected: true

  - id: positive_epic_decomposition_primary
    prompt: "我需要把大 Epic 拆成可交付的用户故事、选择分解策略或评估 Epic 拆分质量时使用；英文触发词 epic breakdown、epic decomposition、epic splitting、story mapping。"
    fixtures: []
    rubric:
      - "recognizes the request as create-prd territory (epic sub-skill)"
      - "uses the skill-specific workflow or domain criteria instead of giving a generic answer"
    trigger_expected: true

  - id: positive_epic_decomposition_realistic
    prompt: "帮我处理这个场景：季度规划或路线图细化，需要把 Epic 拆成可排期的用户故事。"
    fixtures: []
    rubric:
      - "matches a concrete use case described by the skill"
      - "keeps the response focused on the skill's domain boundary"
    trigger_expected: true

  - id: positive_user_story_patterns_primary
    prompt: "我需要编写高质量用户故事、按 INVEST 原则检查故事质量、或用 8 种模式拆分过大故事时使用；英文触发词 user story、story splitting、INVEST、acceptance criteria、Gherkin。"
    fixtures: []
    rubric:
      - "recognizes the request as create-prd territory (user-story sub-skill)"
      - "uses the skill-specific workflow or domain criteria instead of giving a generic answer"
    trigger_expected: true

  - id: positive_user_story_patterns_realistic
    prompt: "帮我处理这个场景：把需求转写成符合 INVEST 的用户故事。"
    fixtures: []
    rubric:
      - "matches a concrete use case described by the skill"
      - "keeps the response focused on the skill's domain boundary"
    trigger_expected: true

  - id: positive_scoping_cutting_primary
    prompt: "我需要定义 MVP、压缩范围、应对 scope creep 或在固定时间内做取舍时使用；帮助找出最小可交付核心与延后项。"
    fixtures: []
    rubric:
      - "recognizes the request as create-prd territory (scoping sub-skill)"
      - "uses the skill-specific workflow or domain criteria instead of giving a generic answer"
    trigger_expected: true

  - id: positive_scoping_cutting_realistic
    prompt: "帮我处理这个场景：MVP 设计、版本瘦身、时间盒交付、资源不足下的功能取舍。"
    fixtures: []
    rubric:
      - "matches a concrete use case described by the skill"
      - "keeps the response focused on the skill's domain boundary"
    trigger_expected: true

  - id: negative_adjacent_3c_strategic_triangle
    prompt: "这个需求应该交给 3c-strategic-triangle：从顾客、公司、竞争者三角度做战略分析、找差异化定位或评估竞争可持续性时使用；英文触发词 3C analysis、Ohmae 3C、customer-company-competitor、strategic triangle。"
    fixtures: []
    rubric:
      - "adjacent 3c-strategic-triangle requests should not trigger create-prd"
    trigger_expected: false

  - id: negative_write_code
    prompt: "Implement the user authentication module based on this requirements doc"
    fixtures: []
    rubric:
      - "does not activate create PRD workflow"
      - "code implementation is a development task, not requirements documentation"
    trigger_expected: false

  - id: negative_market_research
    prompt: "Research the market size for AI-powered developer tools in 2025"
    fixtures: []
    rubric:
      - "does not activate create PRD workflow"
      - "market research is an analysis task, not product requirements documentation"
    trigger_expected: false

  - id: negative_general_unrelated_task
    prompt: "请帮我写一封简短的会议改期通知邮件"
    fixtures: []
    rubric:
      - "general writing or administrative requests are outside this skill"
    trigger_expected: false
