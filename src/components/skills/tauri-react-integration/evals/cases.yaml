cases:
  - id: positive_tauri_react_integration_primary
    prompt: "我需要在 React + Tauri 集成时使用：invoke() TypeScript 封装、useInvoke/useTauriEvent Hook、Rust-React 状态同步、WebView 限制、React Router 深链接、IPC Error Boundary。涉及 @tauri-apps/api + React hooks、listen/unlisten 生命周期"
    fixtures: []
    rubric:
      - "recognizes the request as tauri-react-integration territory"
      - "uses the skill-specific workflow or domain criteria instead of giving a generic answer"
    trigger_expected: true

  - id: positive_tauri_react_integration_realistic
    prompt: "帮我处理这个场景：invoke() 封装为带 loading/error 的 Hook"
    fixtures: []
    rubric:
      - "matches a concrete use case described by the skill"
      - "keeps the response focused on the skill's domain boundary"
    trigger_expected: true

  - id: negative_adjacent_tauri_build_packaging
    prompt: "这个需求应该交给 tauri-build-packaging：在构建、签名、分发 Tauri 应用时使用：bundle 配置、平台目标、代码签名与公证、自动更新、sidecar 打包、CI/CD、体积优化。涉及 cargo tauri build、签名密钥、externalBin、CI 矩阵"
    fixtures: []
    rubric:
      - "adjacent tauri-build-packaging requests should not trigger tauri-react-integration"
    trigger_expected: false

  - id: negative_general_unrelated_task
    prompt: "请帮我写一封简短的会议改期通知邮件"
    fixtures: []
    rubric:
      - "general writing or administrative requests are outside this skill"
    trigger_expected: false
