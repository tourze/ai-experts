    prompt: "我需要开发或审查 Webman 插件的 Install.php、config 发布、进程声明或 Bootstrap"
    fixtures: []
    rubric:
      - "recognizes the request as webman-plugin-development territory"
      - "uses the skill-specific workflow or domain criteria instead of giving a generic answer"
    trigger_expected: true

  - id: positive_webman_plugin_development_realistic
    prompt: "帮我处理这个场景：开发 Composer 分发的 webman 插件。"
    fixtures: []
