      - "matches a concrete use case described by the skill"
      - "keeps the response focused on the skill's domain boundary"
    trigger_expected: true

  - id: negative_adjacent_webman_custom_processes
    prompt: "这个需求应该交给 webman-custom-processes：声明或排查 Webman 自定义进程、Timer、Crontab 或 crash-restart"
    fixtures: []
