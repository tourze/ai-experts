cases:
  - id: create_project_constitution
    prompt: "Create a Spec Kit constitution for this repository with project principles and governance rules."
    fixtures: []
    rubric:
      - "defines source-of-law principles for the project"
      - "updates constitution version semantics appropriately"
      - "syncs relevant template or process constraints"
    trigger_expected: true

  - id: update_constitution_principle
    prompt: "Update our project constitution to add a security-first principle and adjust affected templates."
    fixtures: []
    rubric:
      - "classifies the constitutional change by semantic version impact"
      - "records principle changes and affected downstream process documents"
      - "keeps the constitution as the governing source"
    trigger_expected: true

  - id: negative_feature_spec
    prompt: "Write a spec.md for adding audit logs."
    fixtures: []
    rubric:
      - "does not activate constitution workflow"
      - "feature specification belongs to speckit-specify"
    trigger_expected: false

  - id: negative_status_board
    prompt: "Show the current progress for all Spec Kit features."
    fixtures: []
    rubric:
      - "does not activate constitution workflow"
      - "feature progress belongs to speckit-status"
    trigger_expected: false
