cases:
  - id: implement_landing_page_redesign
    prompt: "Redesign and implement this SaaS landing page using React, Vite, TypeScript, Tailwind, and shadcn/ui."
    fixtures: []
    rubric:
      - "treats the task as landing page implementation"
      - "uses the expected frontend stack and component structure"
      - "improves conversion-oriented layout, hierarchy, and copy"
    trigger_expected: true

  - id: rebuild_low_conversion_page
    prompt: "Our landing page conversion is poor. Rebuild the page experience, not just critique it."
    fixtures: []
    rubric:
      - "moves from audit to concrete page redesign"
      - "includes visual structure, sections, CTA, and proof"
      - "keeps the result implementable"
    trigger_expected: true

  - id: negative_cro_methodology
    prompt: "Create a CRO experiment plan and hypothesis backlog for this page."
    fixtures: []
    rubric:
      - "does not activate page implementation workflow"
      - "experiment methodology belongs to cro-methodology"
    trigger_expected: false

  - id: negative_copy_only
    prompt: "Rewrite the landing page hero and CTA copy only."
    fixtures: []
    rubric:
      - "does not activate full landing page redesign"
      - "copy-only work belongs to copywriting"
    trigger_expected: false
