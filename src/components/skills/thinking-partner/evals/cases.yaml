cases:
  - id: untangle_messy_situation
    prompt: "I'm stuck on a decision about whether to rewrite our legacy system or keep patching it, help me think through this"
    fixtures: []
    rubric:
      - "asks clarifying questions to understand the real constraints"
      - "helps decompose the messy problem into concrete sub-questions"
      - "converges toward an actionable next step rather than endless analysis"
    trigger_expected: true

  - id: career_decision
    prompt: "I got two job offers and I can't decide, one is higher pay at a big corp, the other is a startup with equity"
    fixtures: []
    rubric:
      - "helps identify the core tradeoffs and personal priorities"
      - "surfaces hidden assumptions and risks for each option"
      - "guides toward a decision framework rather than making the choice"
    trigger_expected: true

  - id: positive_socratic_teaching_primary
    prompt: "我需要想通过被提问来理解代码、系统或概念时使用。用户提到\"苏格拉底\"\"Socrates\"\"socratic\"\"别直接告诉我答案\"\"引导我\"\"让我自己想\"时触发。适用于学习新代码库、理解复杂系统、代码 review 教学、概念探索等场景。与 thinking-partner 的区别：thinking-partner 会在后期共创解法，本 skill 全程只问不答。"
    fixtures: []
    rubric:
      - "recognizes the request as socratic-teaching territory"
      - "uses the skill-specific workflow or domain criteria instead of giving a generic answer"
    trigger_expected: true

  - id: positive_socratic_teaching_realistic
    prompt: "帮我处理这个场景：用户说\"苏格拉底\"\"Socrates\"\"socratic mode\"\"别直接告诉我答案\"\"引导我自己想\"。"
    fixtures: []
    rubric:
      - "matches a concrete use case described by the skill"
      - "keeps the response focused on the skill's domain boundary"
    trigger_expected: true


  - id: negative_write_code
    prompt: "Write a Python function to merge two sorted arrays"
    fixtures: []
    rubric:
      - "does not activate thinking partner workflow"
      - "a direct coding task does not need thinking partnership"
    trigger_expected: false

  - id: negative_factual_lookup
    prompt: "What is the population of Tokyo?"
    fixtures: []
    rubric:
      - "does not activate thinking partner workflow"
      - "a factual lookup does not require structured thinking facilitation"
    trigger_expected: false
