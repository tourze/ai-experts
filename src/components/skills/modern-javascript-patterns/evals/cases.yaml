cases:
  - id: async_error_handling
    prompt: "What's the best pattern for handling errors in async/await chains with multiple API calls?"
    fixtures: []
    rubric:
      - "demonstrates try/catch with async/await for sequential and parallel calls"
      - "covers Promise.allSettled for partial failure scenarios"
      - "shows error aggregation and fallback patterns"
    trigger_expected: true

  - id: destructuring_and_spread
    prompt: "Show me modern JavaScript patterns for merging objects and handling optional properties"
    fixtures: []
    rubric:
      - "demonstrates spread operator for shallow merge and object rest"
      - "covers optional chaining (?.) and nullish coalescing (??)"
      - "shows structuredClone for deep copy when needed"
    trigger_expected: true

  - id: es_modules_patterns
    prompt: "Help me refactor my CommonJS require() calls to ES module import/export syntax"
    fixtures: []
    rubric:
      - "maps require/module.exports to import/export equivalents"
      - "handles dynamic imports with import() for conditional loading"
      - "covers package.json type field and file extension requirements"
    trigger_expected: true

  - id: positive_js_micro_optimization_primary
    prompt: "我需要优化 JavaScript 热路径性能、减少不必要的迭代和查找、或改善 DOM 操作效率时使用。用户提到 JS 性能、热路径优化、Set/Map 查找、循环优化、DOM 批处理、requestIdleCallback"
    fixtures: []
    rubric:
      - "recognizes the request as micro-optimization territory"
      - "uses the skill-specific workflow or domain criteria instead of giving a generic answer"
    trigger_expected: true

  - id: positive_js_micro_optimization_realistic
    prompt: "帮我处理这个场景：热路径代码存在 O(n²) 查找、重复迭代或冗余计算。"
    fixtures: []
    rubric:
      - "matches a concrete use case described by the skill"
      - "keeps the response focused on the skill's domain boundary"
    trigger_expected: true

  - id: negative_css_framework
    prompt: "Should I use Tailwind CSS or Bootstrap for my project?"
    fixtures: []
    rubric:
      - "does not activate modern javascript patterns workflow"
      - "CSS framework selection is a styling concern, not a JavaScript pattern"
    trigger_expected: false

  - id: negative_general_unrelated_task
    prompt: "请帮我写一封简短的会议改期通知邮件"
    fixtures: []
    rubric:
      - "general writing or administrative requests are outside this skill"
    trigger_expected: false
