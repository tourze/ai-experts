cases:
  - id: tdd_new_feature
    prompt: "I need to implement a shopping cart discount calculator, let's do it TDD style"
    fixtures: []
    rubric:
      - "starts with a failing test before writing any implementation"
      - "follows red-green-refactor cycle explicitly"
      - "incrementally adds test cases for edge cases and boundary conditions"
    trigger_expected: true

  - id: tdd_bug_fix
    prompt: "There's a bug where duplicate emails are accepted during registration, write a failing test first then fix it"
    fixtures: []
    rubric:
      - "writes a regression test that reproduces the bug before fixing"
      - "confirms the test fails with current code (red phase)"
      - "implements the minimal fix to pass the test (green phase)"
    trigger_expected: true

  - id: negative_add_tests_after
    prompt: "We already shipped the feature, now add unit tests to get coverage above 80%"
    fixtures: []
    rubric:
      - "does not activate test-driven development workflow"
      - "retroactive test writing is coverage backfill, not TDD"
    trigger_expected: false

  - id: negative_manual_testing
    prompt: "Write a manual QA test plan for the checkout flow"
    fixtures: []
    rubric:
      - "does not activate test-driven development workflow"
      - "manual QA planning is a different testing approach from TDD"
    trigger_expected: false
