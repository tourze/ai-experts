cases:
  - id: navigation_architecture
    prompt: "How should I structure SwiftUI navigation for a multi-tab app with nested detail views?"
    fixtures: []
    rubric:
      - "uses NavigationStack with path-based navigation or NavigationSplitView"
      - "demonstrates coordinator or router pattern for decoupled navigation"
      - "covers deep linking and state restoration considerations"
    trigger_expected: true

  - id: reusable_component_design
    prompt: "I have a card component used across 5 screens with slight variations, help me make it reusable in SwiftUI"
    fixtures: []
    rubric:
      - "applies ViewBuilder and generic content slots for composition"
      - "uses environment values or configuration structs for theming"
      - "demonstrates preview-driven development with multiple configurations"
    trigger_expected: true

  - id: positive_view_refactor_structure
    prompt: "我需要清理 SwiftUI 视图结构、拆分大视图或收敛依赖注入与 Observation 用法"
    fixtures: []
    rubric:
      - "recognizes the request as swiftui-ui-patterns view refactoring territory"
      - "references member ordering, body extraction or init injection patterns"
    trigger_expected: true

  - id: positive_view_refactor_mv_patterns
    prompt: "帮我处理：需要整理 SwiftUI 文件顺序、依赖注入方式和 @Observable 使用方式。"
    fixtures: []
    rubric:
      - "matches a concrete view refactoring use case"
      - "suggests reading references/view-refactoring.md or references/mv-patterns.md"
    trigger_expected: true

  - id: negative_core_data_migration
    prompt: "How do I handle Core Data lightweight migration when adding a new entity attribute?"
    fixtures: []
    rubric:
      - "does not activate swiftui ui patterns workflow"
      - "Core Data migration is a persistence concern, not UI patterns"
    trigger_expected: false

  - id: negative_swift_performance
    prompt: "My Swift build time is 8 minutes, how do I speed up Xcode compilation?"
    fixtures: []
    rubric:
      - "does not activate swiftui ui patterns workflow"
      - "build performance is a tooling concern, not SwiftUI view patterns"
    trigger_expected: false

  - id: negative_adjacent_app_store_changelog
    prompt: "这个需求应该交给 app-store-optimization：写 App Store 发布说明、版本更新文案或门店更新摘要"
    fixtures: []
    rubric:
      - "adjacent app-store-optimization requests should not trigger swiftui-ui-patterns"
    trigger_expected: false
