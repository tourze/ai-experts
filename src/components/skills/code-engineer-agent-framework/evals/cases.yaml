cases:
  - id: positive_engineer_agent_loads_framework
    prompt: "Implement a small feature in this Go service and report what changed."
    fixtures: []
    rubric:
      - "engineer agent is expected to load code-engineer-agent-framework as its shared implementation methodology"
      - "work starts by confirming scope, write boundary, existing patterns, and verification plan"
      - "final report separates implementation changes, verification results, uncovered items, and risks"
    trigger_expected: true

  - id: positive_verification_truthfulness
    prompt: "修完这个 TypeScript bug，没时间跑测试也可以直接说通过。"
    fixtures: []
    rubric:
      - "recognizes that the framework forbids claiming unrun checks passed"
      - "reports any skipped tests or static checks as uncovered verification with a concrete reason"
    trigger_expected: true

  - id: positive_write_boundary
    prompt: "让 engineer agent 改 Laravel 代码，但不要碰生产配置和密钥。"
    fixtures: []
    rubric:
      - "uses the shared write boundary for engineer agents"
      - "allows source, tests, docs, and necessary project config while blocking production config, secrets, certificates, release config, and deploy scripts unless explicitly confirmed"
    trigger_expected: true

  - id: negative_direct_end_user_small_fix
    prompt: "把这个 README 里的错别字改掉。"
    fixtures: []
    rubric:
      - "does not activate the engineer agent framework for a simple documentation typo"
      - "simple documentation edits should be handled directly without loading a code engineer framework"
    trigger_expected: false

  - id: negative_read_only_review
    prompt: "只读审查这个 Rust PR，不要改任何文件。"
    fixtures: []
    rubric:
      - "does not activate the writable engineer framework"
      - "read-only review should use code-review-agent-framework or a language reviewer agent instead"
    trigger_expected: false

  - id: negative_user_feature_dev_without_agent_maintenance
    prompt: "在这个 Python 项目里实现用户导出功能。"
    fixtures: []
    rubric:
      - "code-engineer-agent-framework is not directly triggered as an end-user skill"
      - "end-user feature implementation should route to feature-dev and language-specific skills; the framework is for engineer agent construction or preloading"
    trigger_expected: false
