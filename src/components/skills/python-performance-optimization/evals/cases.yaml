cases:
  - id: profile_slow_endpoint
    prompt: "My FastAPI endpoint takes 3 seconds to respond, help me profile and optimize it"
    fixtures: []
    rubric:
      - "suggests profiling tools like cProfile, py-spy, or line_profiler"
      - "identifies common bottlenecks (N+1 queries, blocking I/O, unnecessary serialization)"
      - "provides measurable before/after optimization approach"
    trigger_expected: true

  - id: reduce_memory_usage
    prompt: "My Python data pipeline is using 8GB of RAM processing a 500MB CSV, how can I reduce memory?"
    fixtures: []
    rubric:
      - "suggests chunked reading, generators, or pandas dtype optimization"
      - "recommends memory profiling with tracemalloc or memory_profiler"
      - "covers strategies like __slots__, itertools, or streaming approaches"
    trigger_expected: true

  - id: negative_python_syntax_error
    prompt: "I'm getting a SyntaxError on line 42 of my Python script"
    fixtures: []
    rubric:
      - "does not activate performance optimization workflow"
      - "syntax errors are debugging tasks, not performance optimization"
    trigger_expected: false

  - id: negative_install_package
    prompt: "How do I install numpy and pandas in a virtual environment?"
    fixtures: []
    rubric:
      - "does not activate performance optimization workflow"
      - "package installation is a setup task, not performance optimization"
    trigger_expected: false
