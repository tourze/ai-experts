cases:
  - id: positive_rust_cargo_workspace_primary
    prompt: "我需要需要管理 Cargo workspace 时使用；涉及 [workspace]、workspace.dependencies、feature flag 或 crate 拆分"
    fixtures: []
    rubric:
      - "recognizes the request as rust-cargo-workspace territory"
      - "uses the skill-specific workflow or domain criteria instead of giving a generic answer"
    trigger_expected: true

  - id: positive_rust_cargo_workspace_realistic
    prompt: "帮我处理这个场景：新建/重构 Rust monorepo，规划成员和共享依赖。"
    fixtures: []
    rubric:
      - "matches a concrete use case described by the skill"
      - "keeps the response focused on the skill's domain boundary"
    trigger_expected: true

  - id: negative_adjacent_rust_async_patterns
    prompt: "这个需求应该交给 rust-async-patterns：需要开发或排障 Tokio 异步代码时使用；涉及 tokio::spawn、JoinSet、channel、select! 或异步生命周期"
    fixtures: []
    rubric:
      - "adjacent rust-async-patterns requests should not trigger rust-cargo-workspace"
    trigger_expected: false

  - id: negative_general_unrelated_task
    prompt: "请帮我写一封简短的会议改期通知邮件"
    fixtures: []
    rubric:
      - "general writing or administrative requests are outside this skill"
    trigger_expected: false
