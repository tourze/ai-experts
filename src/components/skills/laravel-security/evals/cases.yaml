cases:
  - id: positive_laravel_security_primary
    prompt: "我需要提到 Laravel 安全、Sanctum、Policy、FormRequest、文件上传安全、CORS、安全头或密钥管理"
    fixtures: []
    rubric:
      - "recognizes the request as laravel-security territory"
      - "uses the skill-specific workflow or domain criteria instead of giving a generic answer"
    trigger_expected: true

  - id: positive_laravel_security_realistic
    prompt: "帮我处理这个场景：新增登录、API 令牌、策略、上传接口、Webhook 或任何处理用户输入的 Laravel 端点。"
    fixtures: []
    rubric:
      - "matches a concrete use case described by the skill"
      - "keeps the response focused on the skill's domain boundary"
    trigger_expected: true

  - id: negative_adjacent_laravel_layering_patterns
    prompt: "这个需求应该交给 laravel-layering-patterns：实现 Laravel 10+ 的 Model/Migration、FormRequest 校验、JsonResource 序列化、Controller 瘦身、异步 Job 编排或 Livewire 组件"
    fixtures: []
    rubric:
      - "adjacent laravel-layering-patterns requests should not trigger laravel-security"
    trigger_expected: false

  - id: negative_general_unrelated_task
    prompt: "请帮我写一封简短的会议改期通知邮件"
    fixtures: []
    rubric:
      - "general writing or administrative requests are outside this skill"
    trigger_expected: false
