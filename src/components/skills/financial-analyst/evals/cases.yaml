    prompt: "我需要做财报比率分析、DCF 估值、预算偏差或滚动预测时使用。英文触发词包括 cash flow analysis、budget variance、financial projections。"
    fixtures: []
    rubric:
      - "recognizes the request as financial-analyst territory"
      - "uses the skill-specific workflow or domain criteria instead of giving a generic answer"
