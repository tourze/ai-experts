cases:
  - id: positive_mysql_transaction_locking_primary
    prompt: "我需要诊断或优化 MySQL InnoDB 事务隔离、行锁、间隙锁、插入意向锁、自增锁或死锁时使用。适用于并发冲突排查。"
    fixtures: []
    rubric:
      - "recognizes the request as mysql-transaction-locking territory"
      - "uses the skill-specific workflow or domain criteria instead of giving a generic answer"
    trigger_expected: true

  - id: positive_mysql_transaction_locking_realistic
    prompt: "帮我处理这个场景：排查死锁告警，需要读懂 SHOW ENGINE INNODB STATUS 并定位根因。"
    fixtures: []
    rubric:
      - "matches a concrete use case described by the skill"
      - "keeps the response focused on the skill's domain boundary"
    trigger_expected: true

  - id: positive_mysql_insert_intention_lock
    prompt: "MySQL 里看到 lock_mode X locks gap before rec insert intention waiting，这是什么锁，为什么两个 INSERT 有时互不阻塞？"
    fixtures: []
    rubric:
      - "recognizes insert intention locks and gap-lock diagnostics as mysql-transaction-locking territory"
      - "explains the lock using InnoDB lock taxonomy instead of generic SQL performance advice"
    trigger_expected: true

  - id: positive_mysql_autoinc_lock_mode
    prompt: "MySQL 8.0 的 innodb_autoinc_lock_mode 默认值是多少？AUTO-INC 锁和 statement-based replication 有什么关系？"
    fixtures: []
    rubric:
      - "recognizes AUTO-INC lock mode as part of MySQL transaction and locking behavior"
      - "mentions version-specific defaults and replication safety boundaries"
    trigger_expected: true

  - id: negative_adjacent_mysql_index_strategy
    prompt: "这个需求应该交给 mysql-index-strategy：设计、审查或优化 MySQL 索引、复合索引顺序或解读 EXPLAIN 时使用；英文触发词 MySQL index / EXPLAIN / composite index / covering index。"
    fixtures: []
    rubric:
      - "adjacent mysql-index-strategy requests should not trigger mysql-transaction-locking"
    trigger_expected: false

  - id: negative_general_unrelated_task
    prompt: "请帮我写一封简短的会议改期通知邮件"
    fixtures: []
    rubric:
      - "general writing or administrative requests are outside this skill"
    trigger_expected: false
