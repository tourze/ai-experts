cases:
  - id: b2b_content_strategy_from_scratch
    prompt: "Help me build a content strategy for our B2B SaaS product. We sell expense management software to finance teams at companies with 50-500 employees. We currently have no blog and want to start from scratch."
    fixtures: []
    rubric:
      - "Checks for product-marketing-context.md"
      - "Establishes 3-5 content pillars"
      - "Maps content by buyer stage (awareness through implementation)"
      - "Includes keyword research by buyer stage"
      - "Recommends mix of searchable and shareable content"
      - "Uses prioritization scoring framework"
      - "Provides publishing cadence or calendar"
      - "Recommends appropriate starting content types"
    trigger_expected: true
  - id: content_audit_and_clustering
    prompt: "We have 200+ blog posts but traffic has been flat for a year. Our content feels random — no clear strategy. How do we fix this?"
    fixtures: []
    rubric:
      - "Diagnoses the 'random content' problem"
      - "Recommends content audit for existing posts"
      - "Introduces content pillars and topical clustering"
      - "Identifies hub-and-spoke opportunities"
      - "Recommends update, consolidate, or retire decisions"
      - "Uses prioritization framework"
      - "Addresses topical authority building"
    trigger_expected: true
  - id: developer_content_types
    prompt: "what kind of content should we be creating? we're a developer tool (API testing platform) and our audience is backend developers and QA engineers"
    fixtures: []
    rubric:
      - "Triggers on casual phrasing"
      - "Recommends content types for developer audience"
      - "Emphasizes technical depth and practical value"
      - "Notes developers prefer substance over marketing"
      - "Suggests content pillars for developer tool"
      - "Uses ideation sources framework"
      - "Mentions developer community channels"
    trigger_expected: true
  - id: content_prioritization_framework
    prompt: "How should we prioritize which content to create first? We have a list of 50 blog post ideas but limited resources — one content marketer writing 2 posts per week."
    fixtures: []
    rubric:
      - "Applies prioritization scoring framework with weights"
      - "Explains each scoring dimension"
      - "Recommends focusing on high-impact, lower-effort first"
      - "Considers buyer stage distribution"
      - "Provides practical workflow for limited resources"
    trigger_expected: true
  - id: content_cluster_design
    prompt: "We want to build topical authority in 'employee engagement.' What does a content cluster look like for this topic?"
    fixtures: []
    rubric:
      - "Applies hub-and-spoke content cluster model"
      - "Designs a pillar page for the core topic"
      - "Identifies 8-15 supporting spoke articles"
      - "Maps internal linking between hub and spokes"
      - "Addresses keyword research for the cluster"
      - "Recommends content types for each piece"
    trigger_expected: true
  - id: content_creation_boundary
    prompt: "Can you write a blog post about remote work best practices for our HR software blog?"
    fixtures: []
    rubric:
      - "Recognizes this as content creation, not strategy"
      - "Keeps focus on strategic framing instead of full drafting"
      - "Does not attempt to write the full blog post"
      - "May provide strategic context for the piece"
    trigger_expected: true
  - id: repurpose_blog_multi_platform
    prompt: "Turn this blog post into LinkedIn, Reddit, newsletter, and short video content."
    fixtures: []
    rubric:
      - "adapts one source asset into multiple platform-native formats"
      - "changes framing and length per platform"
      - "preserves core message while avoiding copy-paste reuse"
    trigger_expected: true

  - id: maximize_distribution
    prompt: "We published a webinar. Repurpose it into a month of content for different channels."
    fixtures: []
    rubric:
      - "extracts reusable ideas from the source"
      - "creates channel-specific derivatives"
      - "plans sequencing or distribution cadence"
    trigger_expected: true


  - id: build_topic_cluster
    prompt: "Design a topic cluster around employee engagement with a pillar page and supporting articles."
    fixtures: []
    rubric:
      - "creates pillar and supporting content structure"
      - "maps internal links between hub and spokes"
      - "addresses topical authority and keyword coverage"
    trigger_expected: true

  - id: keyword_cannibalization_cluster
    prompt: "Our HR blog has keyword cannibalization. Reorganize it into topic clusters."
    fixtures: []
    rubric:
      - "detects overlapping topics and search intent"
      - "groups pages into clusters"
      - "recommends consolidation and internal linking"
    trigger_expected: true


  - id: score_blog_post_seo_quality
    prompt: "Score this blog post for SEO content quality and tell me if it is ready to publish."
    fixtures: []
    rubric:
      - "uses a content quality scoring lens"
      - "assesses search intent, keyword depth, structure, E-E-A-T, and usefulness"
      - "returns prioritized content improvements"
    trigger_expected: true

  - id: publishing_standard_review
    prompt: "Evaluate whether this article meets our SEO publishing standard for the target keyword."
    fixtures: []
    rubric:
      - "checks content against target keyword and SERP intent"
      - "identifies missing sections, evidence, and user questions"
      - "separates content quality from technical site issues"
    trigger_expected: true


  - id: negative_copy_editing_existing_page
    prompt: "Polish this existing landing page copy so it sounds clearer and less generic."
    fixtures: []
    rubric:
      - "does not activate content strategy workflow"
      - "editing existing marketing copy belongs to copy-editing"
    trigger_expected: false
  - id: negative_technical_seo_fix
    prompt: "Fix our canonical tags, sitemap issues, and Search Console indexing errors."
    fixtures: []
    rubric:
      - "does not activate content strategy workflow"
      - "technical search issues belong to seo"
    trigger_expected: false

  # domain-name-brainstormer 降级后的 evals
  - id: product_domain_brainstorm
    prompt: "Brainstorm domain names for a new AI meeting notes product and narrow to the best candidates."
    fixtures: []
    rubric:
      - "generates domain directions and naming territories"
      - "screens for memorability, clarity, pronunciation, and availability risk"
      - "narrows candidates with rationale"
    trigger_expected: true

  - id: brand_domain_shortlist
    prompt: "We need a domain name for a developer tool brand. Give me options and a shortlisting framework."
    fixtures: []
    rubric:
      - "creates a structured candidate pool"
      - "uses criteria for brand fit, spelling, extension, and expansion risk"
      - "separates naming exploration from final trademark or legal clearance"
    trigger_expected: true

  - id: negative_product_positioning
    prompt: "Write the positioning statement for our product."
    fixtures: []
    rubric:
      - "does not activate domain brainstorming"
      - "positioning strategy belongs outside domain-name ideation"
    trigger_expected: false

  - id: negative_landing_page_copy
    prompt: "Write homepage copy for this product name."
    fixtures: []
    rubric:
      - "does not activate domain-name workflow"
      - "homepage copy belongs to copywriting"
    trigger_expected: false
