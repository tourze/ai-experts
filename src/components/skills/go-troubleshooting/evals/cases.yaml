cases:
  - id: goroutine_leak
    prompt: "Go 服务运行一段时间后 goroutine 数量持续增长，内存也跟着涨，怎么排查根因？"
    fixtures: []
    rubric:
      - "触发 go-troubleshooting"
      - "要求先用 pprof goroutine profile 或 runtime.NumGoroutine() 确认泄漏"
      - "检查 goroutine 退出路径是否缺少 context 取消或 channel 关闭"
    trigger_expected: true

  - id: race_condition
    prompt: "Go 程序偶尔出现数据不一致，怀疑有 data race，应该怎么定位和修复？"
    fixtures: []
    rubric:
      - "触发 go-troubleshooting"
      - "建议运行 go test -race ./... 复现"
      - "要求修根因（加锁/channel 所有权），不是掩盖症状"
    trigger_expected: true

  - id: negative_error_wrapping
    prompt: "Go 里 fmt.Errorf 用 %w 包装错误后，上层应该怎么用 errors.Is 和 errors.As？"
    fixtures: []
    rubric:
      - "不触发 go-troubleshooting"
      - "错误包装与解包属于 go-error-handling"
    trigger_expected: false

  - id: negative_testing
    prompt: "Go 项目应该怎么组织 table-driven test 和 mock？"
    fixtures: []
    rubric:
      - "不触发 go-troubleshooting"
      - "测试模式属于 go-testing-patterns"
    trigger_expected: false
