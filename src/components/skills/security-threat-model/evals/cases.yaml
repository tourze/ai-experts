cases:
  - id: threat_model_api
    prompt: "Do a threat model for our REST API that handles user authentication and payment processing"
    fixtures: []
    rubric:
      - "identifies trust boundaries between client, API, and payment provider"
      - "enumerates assets: credentials, tokens, payment data, PII"
      - "produces structured threat list with attacker capabilities and abuse paths"
    trigger_expected: true

