cases:
  - id: technical_doc_with_diagrams
    prompt: "Write a technical architecture document for our payment service with sequence diagrams and flowcharts"
    fixtures: []
    rubric:
      - "produces well-structured Markdown with clear headings and sections"
      - "includes Mermaid sequence diagrams for key interaction flows"
      - "uses Mermaid flowcharts or C4 diagrams for architecture overview"
    trigger_expected: true

  - id: decision_record
    prompt: "Create an ADR for choosing PostgreSQL over MongoDB for our user data store"
    fixtures: []
    rubric:
      - "follows ADR format: context, decision, status, consequences"
      - "includes comparison tables in Markdown"
      - "optionally includes Mermaid diagrams for data flow or decision tree"
    trigger_expected: true

  - id: positive_pretty_mermaid_primary
    prompt: "我需要把 Mermaid 图表渲染成更美观的 SVG 或 ASCII 输出，或明确要求“画图”“美化 Mermaid”“渲染 Mermaid”“批量导出 Mermaid 图”时使用。该技能补足 Mermaid 从源码到成品图的渲染链路。"
    fixtures: []
    rubric:
      - "recognizes the request as pretty-mermaid territory"
      - "uses the skill-specific workflow or domain criteria instead of giving a generic answer"
    trigger_expected: true

  - id: positive_pretty_mermaid_realistic
    prompt: "帮我处理这个场景：用户已经有 Mermaid 源码，需要渲染成 SVG 成品图或终端可读的 ASCII 图。"
    fixtures: []
    rubric:
      - "matches a concrete use case described by the skill"
      - "keeps the response focused on the skill's domain boundary"
    trigger_expected: true


  - id: negative_pdf_generation
    prompt: "Convert this Markdown file to a styled PDF with custom fonts"
    fixtures: []
    rubric:
      - "does not activate markdown mermaid writing workflow"
      - "PDF conversion is a format transformation task, not document writing"
    trigger_expected: false

  - id: negative_code_comments
    prompt: "Add JSDoc comments to all exported functions in this TypeScript file"
    fixtures: []
    rubric:
      - "does not activate markdown mermaid writing workflow"
      - "code documentation comments are inline code tasks, not document writing"
    trigger_expected: false
