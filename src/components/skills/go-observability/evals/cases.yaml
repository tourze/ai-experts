cases:
  - id: slog_migration
    prompt: "Go 项目从 log.Printf 迁移到 slog，应该怎么改？"
    fixtures: []
    rubric:
      - "触发 go-observability"
      - "提到 slog.Info / slog.Warn / slog.Error 结构化替换"
      - "提到 slog.With 预置上下文字段"
    trigger_expected: true

  - id: trace_log_correlation
    prompt: "如何在 Go 日志里自动带上 OpenTelemetry 的 trace ID？"
    fixtures: []
    rubric:
      - "触发 go-observability"
      - "提到自定义 slog.Handler 注入 trace_id / span_id"
      - "提到信号关联原则"
    trigger_expected: true

  - id: negative_error_handling
    prompt: "Go 里 fmt.Errorf 用 %w 还是 %v 包装错误？"
    fixtures: []
    rubric:
      - "不触发 go-observability"
      - "错误包装属于 go-error-handling"
    trigger_expected: false

  - id: negative_concurrency
    prompt: "Go channel 死锁了怎么排查？"
    fixtures: []
    rubric:
      - "不触发 go-observability"
      - "并发排查属于 go-troubleshooting 或 go-concurrency-patterns"
    trigger_expected: false
