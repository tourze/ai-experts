cases:
  - id: positive_tauri_build_packaging_primary
    prompt: "我需要在构建、签名、分发 Tauri 应用时使用：bundle 配置、平台目标、代码签名与公证、自动更新、sidecar 打包、CI/CD、体积优化。涉及 cargo tauri build、签名密钥、externalBin、CI 矩阵"
    fixtures: []
    rubric:
      - "recognizes the request as tauri-build-packaging territory"
      - "uses the skill-specific workflow or domain criteria instead of giving a generic answer"
    trigger_expected: true

  - id: positive_tauri_build_packaging_realistic
    prompt: "帮我处理这个场景：配置 bundle 段（图标、资源、sidecar、安装器）"
    fixtures: []
    rubric:
      - "matches a concrete use case described by the skill"
      - "keeps the response focused on the skill's domain boundary"
    trigger_expected: true

  - id: negative_adjacent_tauri_ipc_patterns
    prompt: "这个需求应该交给 tauri-ipc-patterns：在需要高级 IPC 模式时使用：自定义错误类型、判别联合事件、Channel<T 流、权限定义、多窗口路由、二进制传输、批量命令。涉及 serde tag/content、tauri::ipc::Request、permissions/.toml、emitto"
    fixtures: []
    rubric:
      - "adjacent tauri-ipc-patterns requests should not trigger tauri-build-packaging"
    trigger_expected: false

  - id: negative_general_unrelated_task
    prompt: "请帮我写一封简短的会议改期通知邮件"
    fixtures: []
    rubric:
      - "general writing or administrative requests are outside this skill"
    trigger_expected: false
